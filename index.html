eholderEmail:"you@example.com",placeholderSubject:"What's this about?",placeholderMessage:"Your message",errorName:"Name is required.",errorEmail:"Enter a valid email address.",errorSubject:"Subject is required.",errorMessage:"Message is required.",sendBtn:"Send",notConnectedNote:"This form isn't connected to an email service yet, so your message wasn't actually sent. Please use the email or phone contacts on this page instead for now."},faq:{kicker:"FAQ",title:"Frequently asked questions",intro:"Every answer here is a plain-language paraphrase of APS India's official dMAT FAQ. For anything specific to your own case, contact APS India or g.a.s.t. directly.",source:"APS India official FAQ, verified 02 Jul 2026",footerNote:"This FAQ paraphrases the official APS India dMAT page. Wording is ours; the underlying facts are theirs. For the complete, word-for-word official version, see"},loginModal:{signOut:"Sign out",signingOut:"Signing out...",tabLogin:"Log in",tabSignup:"Sign up",signedInAs:"Signed in as",currentPlan:"Current plan:",planFree:"Free",planPractice:"Practice",loginIntro:"Access your practice sets and progress.",signupIntro:"Create an account and choose a plan.",placeholderEmail:"Email",placeholderPassword:"Password",placeholderPasswordMin:"Password (min. 6 characters)",placeholderName:"Name",loginBtn:"Log in",signingIn:"Signing in...",createAccountBtn:"Create account",creatingAccount:"Creating account...",errorLoginInvalid:"Enter a valid email and your password.",errorSignupInvalid:"Fill in your name, a valid email, and a password of at least 6 characters.",disclosure:"Accounts and login run on a real Supabase backend. The Practice plan now goes through a real Razorpay Checkout flow with server-side signature verification — but it's configured with placeholder test keys, so payment will not complete successfully until real Razorpay keys are added.",planDescFree:"Eligibility checker, official links, 2 sample questions",planDescPractice:"Full unofficial practice sets, all Core Module task types"}},de:{nav:{home:"Startseite",about:"Über uns",dmatGuide:"dMAT-Leitfaden",blog:"Blog",contact:"Kontakt",login:"Anmelden"},common:{readMore:"Weiterlesen",backToAll:"Zurück zu allen Beiträgen",send:"Senden",loading:"Wird geladen...",close:"Schließen",cancel:"Abbrechen",save:"Speichern"},hero:{headline1:"Der dMAT ist neu.",headline2:"Deine Unterlagen",headline3:"müssen dich nicht verwirren.",intro:"Ab dem Sommersemester 2027 müssen indische Bewerber für deutsche Masterstudiengänge in den Bereichen Ingenieurwesen, Handel sowie Wirtschaft/Management ein dMAT-Zertifikat zusammen mit ihren APS-Unterlagen einreichen. Wir verfolgen die offiziellen Anforderungen, damit du sie nicht selbst aus Foren zusammensuchen musst.",ctaCheck:"Prüfen, ob der dMAT für dich gilt",ctaPractice:"Übungsmaterialien ansehen",stats:{opened:"Anmeldung geöffnet",closes:"Anmeldeschluss",firstTest:"Erster Testtermin",certificates:"Zertifikate ausgestellt"}},dmatInfo:{kicker:"01 — Verstehen",title:"Was der dMAT eigentlich ist",p1:"Der Digital Master Test ist ein standardisierter akademischer Eignungstest, der von g.a.s.t. durchgeführt wird und als zusätzliches Element im APS-Dokumentationsprozess eingeführt wurde — er ersetzt weder die APS-Prüfung noch die anabin-Anerkennung oder die Zulassungsentscheidung einer Universität.",p2:"Er gilt nur für ausgewählte Fachrichtungen, nur für das Sommersemester 2027 und später, und nur wenn keine Übergangsregelung greift.",source:"Offizielle Mitteilung von APS India, aktualisiert am 30. Juni 2026",checkTitle:"Schnelle Eignungsprüfung",checkIntro:"Beantworte drei Fragen, um zu sehen, ob der dMAT wahrscheinlich für dich gilt.",labelField:"Deine bisherige Studienrichtung",labelIntake:"Angestrebtes Semester",labelAps:"APS-Status",fields:["Ingenieurwesen (inkl. Informatik/IT)","Handel / Rechnungswesen / Finanzen / Wirtschaftswissenschaften","Wirtschaft / Management","Anderes Fach"],intakes:["Wintersemester 2026/27","Sommersemester 2027 oder später"],apsStatus:["APS-Anmeldung noch nicht begonnen","Registriert/Unterlagen versandt vor dem 29. Juni 2026","Registriert/Unterlagen versandt am oder nach dem 29. Juni 2026","Habe bereits mein APS-Zertifikat"],resultNeeded:"dMAT wahrscheinlich erforderlich",resultNotNeeded:"dMAT wahrscheinlich nicht erforderlich",reasonOtherField:"Dein Fach gehört nicht zur aktuellen Liste der betroffenen Bereiche (Ingenieurwesen, Handel/Finanzen, Wirtschaft/Management).",reasonWinter:"Der dMAT gilt erst ab dem Sommersemester 2027 — die ersten Zertifikate werden erst am 12. Oktober 2026 ausgestellt, nach den Fristen für das Wintersemester 2026/27.",reasonHasCert:"Bewerber, die bereits ein APS-Zertifikat besitzen, müssen den dMAT für dieses abgeschlossene Verfahren nicht ablegen.",reasonExempt:"Du bist befreit — eine vor dem 29. Juni 2026 abgeschlossene APS-Registrierung oder ein vor diesem Datum erfolgter Versand der Unterlagen gilt als Übergangsregelung.",reasonNeeded:"Basierend auf deinem Fach und dem angestrebten Semester ist das dMAT-Zertifikat als Teil deiner APS-Dokumentation erforderlich.",disclaimer:"Dies ist eine Orientierungshilfe auf Basis der aktuellen offiziellen Regeln, keine verbindliche Feststellung. Kläre deinen konkreten Fall direkt mit APS India ab."},booking:{kicker:"03 — Anmeldung",title:"Prüfungsbuchung",p1:'g.a.s.t. übernimmt Registrierung, Zahlung, Testzentrumsbuchung und Ergebnisse direkt — Plätze werden nach dem Prinzip "Wer zuerst kommt, mahlt zuerst" vergeben. Wir wickeln Buchungen nicht selbst ab; hier geht\'s direkt zur Quelle.',source:"APS India / g.a.s.t.",registerBtn:"Bei g.a.s.t. registrieren",fee:"Gebühr: €150 · Anmeldeschluss 15. Sep 2026",centersTitle:"Testzentren (Einführungsphase)",centersNote:"Die endgültige Verfügbarkeit der Testzentren wird während der Registrierung angezeigt und hängt von den verbleibenden Plätzen ab — g.a.s.t. kann keine Plätze im Voraus reservieren."},apsSupport:{kicker:"04 — Dokumentation",title:"APS-Unterstützung",p1:"APS India bleibt allein dafür verantwortlich, die Echtheit und formale Plausibilität deiner akademischen Unterlagen zu prüfen. Der dMAT ist eine zusätzliche Anforderung, die diesen Prozess ergänzt — nicht ersetzt.",p2:"Ein dMAT-Zertifikat gleicht niemals einen Abschluss einer nicht anerkannten Institution aus. Wenn deine bisherige Universität in anabin als H+/-, H- oder mit unklarem Status geführt wird, kläre das zuerst.",anabinLink:"Institution bei anabin prüfen →",source:"APS India, aktualisiert am 30. Juni 2026",exemptTitle:"Du bist vom dMAT befreit, wenn …",exemptions:["APS-Online-Registrierung vor dem 29. Juni 2026 abgeschlossen","Vollständige APS-Bewerbungsunterlagen vor dem 29. Juni 2026 versandt","Bereits ein ausgestelltes APS-Zertifikat für das entsprechende Verfahren besitzt","Teilnahme an einem offiziell bestätigten Austausch-, Doppelabschluss- oder Universitätspartnerschaftsprogramm"]},admissionSupport:{kicker:"05 — Nach dem Test",title:"Unterstützung bei der Zulassung",cards:[{title:"Der dMAT entscheidet nicht über die Zulassung",body:"Deutsche Universitäten entscheiden eigenständig, wie sie dein dMAT-Ergebnis gewichten. Es ist ein Element unter vielen in deiner gesamten Bewerbung, kein Filter."},{title:"Das Ergebnis erscheint auf deinem APS-Zertifikat",body:"Dein dMAT-Ergebnis wird nach Ausstellung auf deinem APS-Zertifikat vermerkt, zusammen mit der üblichen Dokumentenprüfung."},{title:"Ein niedriges Ergebnis ist keine Ablehnung",body:"APS India hat bestätigt, dass ein niedriges dMAT-Ergebnis die Ausstellung deines APS-Zertifikats nicht automatisch verhindert."}]},dmatGuideTabs:{overview:"Übersicht",practice:"Übung",booking:"Anmeldung",aps:"APS-Unterstützung",admission:"Nach der Prüfung"},practice:{kicker:"02 — Vorbereiten",title:"Übungsmaterialien",intro:"Wir trennen offizielle g.a.s.t.-Materialien klar von unseren eigenen Übungsinhalten — wir hosten keine urheberrechtlich geschützten g.a.s.t.-Inhalte weiter und geben eigene Fragen nicht als offiziell aus.",tabOfficial:"Offiziell (g.a.s.t.)",tabUnofficial:"Unsere Übungssets",officialNote:"Hinweis: Die offiziellen Vorbereitungsmaterialien von g.a.s.t. beschreiben die drei bestätigten Aufgabentypen des Core Module — Bildfolgen, Lateinische Quadrate und Gleichungssysteme —, die allgemein für alle dMAT-Fachrichtungen gelten. Wir haben kein Indien-spezifisches Dokument gefunden, das bestätigt, dass diese Core-Module-Zusammensetzung identisch mit dem im APS-Verfahren verwendeten Allgemeinen Akademischen Modul ist, auch wenn das Core Module auf der g.a.s.t.-Website als fachrichtungsübergreifend einheitlich beschrieben wird. Sollte sich das weiter bestätigen, aktualisieren wir diesen Hinweis.",officialLinks:[{title:"dMAT-Vorbereitungsmaterialien für Testteilnehmer (2025)",desc:"Offizielles Vorbereitungs-PDF von g.a.s.t. — Core-Module-Format, ausgearbeitete Beispiele für Muster- und Folgenaufgaben."},{title:"d-mat.de — Vorbereitung auf die Prüfung",desc:"Offizieller Überblick über Prüfungsformat und Vorbereitungshinweise von g.a.s.t."}],unofficialNote:"Basiert auf den drei Aufgabentypen, die in den offiziellen Core-Module-Vorbereitungsmaterialien von g.a.s.t. dokumentiert sind (Bildfolgen, Lateinische Quadrate, Gleichungssysteme). Dies sind eigene Fragen, die wir passend zu diesem dokumentierten Format geschrieben haben — keine offiziellen g.a.s.t.-Inhalte, und nicht garantiert identisch mit dem Schwierigkeitsgrad oder Stil der echten Prüfung. Jedes Set unten enthält unterschiedliche Fragen.",answerLabel:"Antwort:",lockTitle:"Vollständige Sets — ₹499 einmalig",lockDesc:"Schaltet die Übungssets 2–5 mit allen drei Core-Module-Aufgabentypen frei.",upgrade:"Upgrade",signUp:"Registrieren",paymentNote:"Ein echter Razorpay-Checkout mit serverseitiger Verifizierung ist eingerichtet — aktuell mit Platzhalter-Testschlüsseln, daher wird die Zahlung noch nicht abgeschlossen.",lockedPromptUser:"Dieses Set gehört zum Practice-Plan. Führe ein Upgrade durch, um es freizuschalten.",lockedPromptGuest:"Registriere dich und schalte den Practice-Plan frei, um auf dieses Set zuzugreifen.",upgradeWithPrice:"Upgrade — ₹499"},verifiedBadge:{verified:"Verifiziert",unofficial:"Inoffiziell — nicht von g.a.s.t."},whatsapp:{ariaLabel:"Auf WhatsApp chatten"},footer:{description:"Eine unabhängige Ressource für indische Bewerber, die sich mit der neuen dMAT-Anforderung auseinandersetzen. Nicht verbunden mit APS India oder g.a.s.t.",officialSources:"Offizielle Quellen",contact:"Kontakt",apsQueries:"APS-Anfragen",dmatQueries:"dMAT-Anfragen",terms:"Allgemeine Geschäftsbedingungen",privacy:"Datenschutzerklärung",cookies:"Cookie-Richtlinie",lastVerified:"Zuletzt geprüft am 02. Juli 2026 anhand offizieller Quellen von APS India und g.a.s.t. Anforderungen können sich ändern — bestätige Angaben stets auf den offiziellen Seiten, bevor du dich registrierst oder Unterlagen einreichst.",craftedBy:"Erstellt von"},cookieBanner:{message:"Wir verwenden minimalen lokalen Speicher, um deine Cookie-Wahl und Design-Einstellung zu merken. Wir verwenden keine Cookies von Drittanbietern zu Tracking- oder Werbezwecken.",learnMore:"Mehr erfahren",accept:"Akzeptieren"},about:{kicker:"Über uns",title:"Aufgebaut von zwei Menschen, die immer wieder auf dasselbe Problem gestoßen sind.",intro:"Der dMAT wurde am 29. Juni 2026 angekündigt, und die offiziellen Informationen waren über APS-India-Mitteilungen, g.a.s.t.-Seiten und PDFs verstreut, in denen man leicht ein Detail übersehen kann. Wir haben dMAT.prep gebaut, um die Zulassungsregeln, Ausnahmen, Termine und Testzentrumsdetails an einem Ort zu bündeln — direkt bei APS India und g.a.s.t. recherchiert und laufend aktualisiert, während sich der Prozess weiterentwickelt.",role:"Mitgründer",contactDisclaimer:"Kontaktangaben wie von den Gründern angegeben — nicht unabhängig überprüft.",bios:{"Jomy Joseph":"Jomy hat dMAT.prep mitgegründet, um indischen Bewerbern zu helfen, Deutschlands neueste Zulassungsanforderung zu verstehen. Er kümme nts are NOT affected?",answer:"Bachelor's applicants; Bachelor's students who haven't completed at least 5 semesters (3-year programme) or 7 semesters (4-year programme); PhD applicants; applicants whose degree falls outside the listed fields; and applicants in officially confirmed exchange, double-degree, or university partnership programmes."},{question:"I studied a mixed or interdisciplinary subject (e.g. Engineering Management, Business Analytics, Data Science). Am I affected?",answer:"Classification is based on APS India's official affected-fields list, not on how your programme markets itself. Check the official PDF directly — several commonly-assumed-covered fields (like standalone Computer Science, BCA, or Data Science) are explicitly listed as not automatically covered."},{question:"Is the dMAT mandatory?",answer:"Yes, for applicants in the affected fields applying to Summer 2027 intake or later. APS India can only process the application as complete once the dMAT documentation is submitted."},{question:"Can I complete APS first and take the dMAT later?",answer:"No. If you're in an affected field applying for Summer 2027 or later, the dMAT certificate must be submitted together with your APS application documents."},{question:"Can I submit my APS documents without the dMAT certificate?",answer:"If you registered for APS on or after 29 June 2026 and the dMAT requirement applies to you, you may submit your other APS documents first and add the dMAT certificate later once it's available — but APS India can only complete your procedure after the dMAT certificate is submitted."}]},{section:"B. Exemptions",items:[{question:"I registered for APS online before 29 June 2026 but haven't shipped documents yet. Do I need the dMAT?",answer:"No. Completing APS online registration before 29 June 2026 exempts you for that APS procedure, even if you ship your physical documents afterward."},{question:"I shipped my APS documents before 29 June 2026. Do I need the dMAT?",answer:"No, you're exempt for that procedure — even if verification is still ongoing and your certificate hasn't been issued yet. Keep proof of shipment in case it's requested."},{question:"I already have my APS certificate. Do I need the dMAT?",answer:"No, not for that completed procedure. If you submit a new APS application later, the rules in force at that time will apply."},{question:"Am I exempt if I'm on an exchange, double-degree, or partnership programme?",answer:"Yes. Submit the relevant confirmation from your home institution, the German partner institution, or the programme coordinator, including your group number, alongside your APS documentation."},{question:"I'm applying for Winter Semester 2026/27. Do I need the dMAT?",answer:"No. The first dMAT certificates aren't available until 12 October 2026 — after most Winter 2026/27 deadlines. The requirement is intended for Summer 2027 intake and beyond."}]},{section:"C. Recognition, anabin, and formal eligibility",items:[{question:"Does the dMAT replace anabin or formal degree recognition?",answer:"No. A dMAT certificate doesn't change your institution's or degree's recognition status. APS India continues to assess eligibility under its existing procedure, separately from the dMAT."},{question:"My university shows H+/- or H- in anabin. Should I still take the dMAT?",answer:"Check your anabin status carefully before registering for the dMAT or submitting your APS application. Taking the dMAT does not make a degree from a non-recognised institution eligible for APS certification or German university admission."},{question:"Can a good dMAT score compensate for a non-recognised institution?",answer:"No. The dMAT is an academic aptitude test — it doesn't establish formal eligibility, replace anabin, or override recognition requirements."}]},{section:"D. APS procedure and the dMAT certificate",items:[{question:"Does the dMAT replace APS document verification?",answer:"No. APS India continues verifying document authenticity and formal plausibility exactly as before — the dMAT is an additional element, not a substitute."},{question:"Will a low dMAT score automatically get my APS certificate denied?",answer:"No. The dMAT isn't a stand-alone pass/fail test for APS purposes. A low score doesn't automatically lead to a refusal — the APS certificate documents the verification result and, where applicable, reflects the dMAT result."},{question:"Will my dMAT score appear on my APS certificate?",answer:"Yes, for applicants required to take the dMAT. The APS certificate will note that the dMAT was taken and include the result from the certificate issued by g.a.s.t."},{question:"Who issues the dMAT certificate — APS India or g.a.s.t.?",answer:"g.a.s.t. issues the dMAT certificate, not APS India. It's downloadable from the g.a.s.t. test-takers' portal once results are published."}]},{section:"E. Registration, test centres, and fees",items:[{question:"What's the registration timeline?",answer:"Registration opened 29 June 2026, closes 15 September 2026. The test date is 26 September 2026, with certificates available online from 12 October 2026."},{question:"Where can I take the test?",answer:"Planned centres for this first sitting: Ahmedabad, Bengaluru, Bhopal, Chandigarh, Chennai, Kolkata, Mananthavady, Mumbai, New Delhi, and Pune. The final confirmed list is shown during registration."},{question:"What if my preferred test centre is full?",answer:"Booking is first come, first served through g.a.s.t. — APS India cannot reserve seats. You may need to choose a different available centre."},{question:"How much does the dMAT cost?",answer:"€150, payable to g.a.s.t. during registration. Refund conditions exist for certain circumstances — check g.a.s.t.'s terms and conditions before paying."},{question:"Who handles registration and payment — APS India or g.a.s.t.?",answer:"g.a.s.t. handles registration, payment, test centre booking, and results. APS India handles only the separate document-verification procedure."}]},{section:"F. How German universities use the dMAT",items:[{question:"Will German universities actually look at my dMAT result?",answer:"It accompanies your APS certificate as part of your application documentation, but each university decides independently how to weigh it. It doesn't replace the university's own admission decision."},{question:"Does a good dMAT score guarantee admission?",answer:"No. Admission decisions are made independently by each German university — a dMAT result doesn't guarantee an outcome either way."}]},{section:"G. Who to contact",items:[{question:"Who do I contact for APS questions (documents, exemptions, eligibility)?",answer:"APS India directly: info@aps-india.de"},{question:"Who do I contact for dMAT questions (registration, payment, test day, results)?",answer:"g.a.s.t. directly: kontakt@gast.de"}]}],ir=[{section:"A. Umfang und Anforderung",items:[{question:"Wer muss den dMAT ablegen?",answer:"Bewerber, deren bisheriger Abschluss in den Bereichen Ingenieurwesen, Handel/Rechnungswesen/Finanzen/Wirtschaftswissenschaften oder Wirtschaft/Management liegt und die sich für das Sommersemester 2027 oder später bewerben."},{question:"Welche Bewerber sind NICHT betroffen?",answer:"Bachelor-Bewerber; Bachelor-Studierende, die noch nicht mindestens 5 Semester (3-jähriges Programm) oder 7 Semester (4-jähriges Programm) abgeschlossen haben; Promotionsbewerber; Bewerber, deren Abschluss außerhalb der gelisteten Fachrichtungen liegt; sowie Bewerber in offiziell bestätigten Austausch-, Doppelabschluss- oder Universitätspartnerschaftsprogrammen."},{question:"Ich habe ein gemischtes oder interdisziplinäres Fach studiert (z. B. Engineering Management, Business Analytics, Data Science). Bin ich betroffen?",answer:"Die Einstufung erfolgt anhand der offiziellen Liste der betroffenen Fachrichtungen von APS India, nicht danach, wie sich dein Studiengang vermarktet. Prüfe direkt das offizielle PDF — mehrere häufig als abgedeckt angenommene Fächer (wie eigenständige Informatik, BCA oder Data Science) sind ausdrücklich als nicht automatisch abgedeckt gelistet."},{question:"Ist der dMAT verpflichtend?",answer:"Ja, für Bewerber in den betroffenen Fachrichtungen, die sich für das Sommersemester 2027 oder später bewerben. APS India kann die Bewerbung erst als vollständig bearbeiten, wenn die dMAT-Dokumentation eingereicht wurde."},{question:"Kann ich zuerst APS abschließen und den dMAT später ablegen?",answer:"Nein. Wenn du in einer betroffenen Fachrichtung für das Sommersemester 2027 oder später studierst, muss das dMAT-Zertifikat zusammen mit deinen APS-Bewerbungsunterlagen eingereicht werden."},{question:"Kann ich meine APS-Unterlagen ohne das dMAT-Zertifikat einreichen?",answer:"Wenn du dich am oder nach dem 29. Juni 2026 für APS registriert hast und die dMAT-Anforderung für dich gilt, kannst du deine übrigen APS-Unterlagen zuerst einreichen und das dMAT-Zertifikat später nachreichen, sobald es verfügbar ist — APS India kann dein Verfahren jedoch erst nach Einreichung des dMAT-Zertifikats abschließen."}]},{section:"B. Ausnahmen",items:[{question:"Ich habe mich vor dem 29. Juni 2026 online für APS registriert, aber noch keine Unterlagen versandt. Brauche ich den dMAT?",answer:"Nein. Der Abschluss der APS-Online-Registrierung vor dem 29. Juni 2026 befreit dich für dieses APS-Verfahren, auch wenn du deine physischen Unterlagen erst danach versendest."},{question:"Ich habe meine APS-Unterlagen vor dem 29. Juni 2026 versandt. Brauche ich den dMAT?",answer:"Nein, du bist für dieses Verfahren befreit — auch wenn die Prüfung noch läuft und dein Zertifikat noch nicht ausgestellt wurde. Bewahre einen Versandnachweis auf, falls er angefordert wird."},{question:"Ich habe bereits mein APS-Zertifikat. Brauche ich den dMAT?",answer:"Nein, nicht für dieses abgeschlossene Verfahren. Wenn du später eine neue APS-Bewerbung einreichst, gelten die zu diesem Zeitpunkt geltenden Regeln."},{question:"Bin ich befreit, wenn ich an einem Austausch-, Doppelabschluss- oder Partnerschaftsprogramm teilnehme?",answer:"Ja. Reiche die entsprechende Bestätigung deiner Heimatinstitution, der deutschen Partnerinstitution oder des Programmkoordinators zusammen mit deiner APS-Dokumentation ein, einschließlich deiner Gruppennummer."},{question:"Ich bewerbe mich für das Wintersemester 2026/27. Brauche ich den dMAT?",answer:"Nein. Die ersten dMAT-Zertifikate sind erst ab dem 12. Oktober 2026 verfügbar — nach den meisten Fristen für das Wintersemester 2026/27. Die Anforderung ist für das Sommersemester 2027 und später vorgesehen."}]},{section:"C. Anerkennung, anabin und formale Zulassungsvoraussetzungen",items:[{question:"Ersetzt der dMAT anabin oder die formale Anerkennung des Abschlusses?",answer:"Nein. Ein dMAT-Zertifikat ändert nichts am Anerkennungsstatus deiner Institution oder deines Abschlusses. APS India prüft die Zulassungsvoraussetzungen weiterhin nach dem bestehenden Verfahren, unabhängig vom dMAT."},{question:"Meine Universität wird in anabin als H+/- oder H- geführt. Sollte ich trotzdem den dMAT ablegen?",answer:"Prüfe deinen anabin-Status sorgfältig, bevor du dich für den dMAT registrierst oder deine APS-Bewerbung einreichst. Das Ablegen des dMAT macht einen Abschluss einer nicht anerkannten Institution nicht für die APS-Zertifizierung oder die Zulassung an einer deutschen Universität berechtigt."},{question:"Kann ein gutes dMAT-Ergebnis eine nicht anerkannte Institution ausgleichen?",answer:"Nein. Der dMAT ist ein akademischer Eignungstest — er begründet keine formale Zulassungsberechtigung, ersetzt nicht anabin und hebt keine Anerkennungsanforderungen auf."}]},{section:"D. APS-Verfahren und das dMAT-Zertifikat",items:[{question:"Ersetzt der dMAT die APS-Dokumentenprüfung?",answer:"Nein. APS India prüft weiterhin die Echtheit und formale Plausibilität der Dokumente genau wie zuvor — der dMAT ist ein zusätzliches Element, kein Ersatz."},{question:"Führt ein niedriges dMAT-Ergebnis automatisch zur Ablehnung meines APS-Zertifikats?",answer:"Nein. Der dMAT ist für APS-Zwecke kein eigenständiger Bestehen/Nichtbestehen-Test. Ein niedriges Ergebnis führt nicht automatisch zur Ablehnung — das APS-Zertifikat dokumentiert das Prüfergebnis und spiegelt gegebenenfalls das dMAT-Ergebnis wider."},{question:"Erscheint mein dMAT-Ergebnis auf meinem APS-Zertifikat?",answer:"Ja, für Bewerber, die zur Ablegung des dMAT verpflichtet sind. Das APS-Zertifikat vermerkt, dass der dMAT abgelegt wurde, und enthält das Ergebnis aus dem von g.a.s.t. ausgestellten Zertifikat."},{question:"Wer stellt das dMAT-Zertifikat aus — APS India oder g.a.s.t.?",answer:"g.a.s.t. stellt das dMAT-Zertifikat aus, nicht APS India. Es ist nach Veröffentlichung der Ergebnisse über das Testteilnehmerportal von g.a.s.t. herunterladbar."}]},{section:"E. Registrierung, Testzentren und Gebühren",items:[{question:"Wie sieht der Registrierungszeitplan aus?",answer:"Die Registrierung begann am 29. Juni 2026 und endet am 15. September 2026. Der Testtermin ist der 26. September 2026, Zertifikate sind ab dem 12. Oktober 2026 online verfügbar."},{question:"Wo kann ich den Test ablegen?",answer:"Geplante Zentren für diesen ersten Testtermin: Ahmedabad, Bengaluru, Bhopal, Chandigarh, Chennai, Kolkata, Mananthavady, Mumbai, Neu-Delhi und Pune. Die endgültige, bestätigte Liste wird während der Registrierung angezeigt."},{question:"Was, wenn mein bevorzugtes Testzentrum ausgebucht ist?",answer:'Die Buchung erfolgt über g.a.s.t. nach dem Prinzip "Wer zuerst kommt, mahlt zuerst" — APS India kann keine Plätze reservieren. Möglicherweise musst du ein anderes verfügbares Zentrum wählen.'},{question:"Wie viel kostet der dMAT?",answer:"€150, zahlbar an g.a.s.t. während der Registrierung. Unter bestimmten Umständen gibt es Rückerstattungsbedingungen — prüfe die Geschäftsbedingungen von g.a.s.t. vor der Zahlung."},{question:"Wer kümmert sich um Registrierung und Zahlung — APS India oder g.a.s.t.?",answer:"g.a.s.t. übernimmt Registrierung, Zahlung, Testzentrumsbuchung und Ergebnisse. APS India ist ausschließlich für das separate Dokumentenprüfungsverfahren zuständig."}]},{section:"F. Wie deutsche Universitäten den dMAT nutzen",items:[{question:"Schauen sich deutsche Universitäten mein dMAT-Ergebnis tatsächlich an?",answer:"Es begleitet dein APS-Zertifikat als Teil deiner Bewerbungsunterlagen, aber jede Universität entscheidet eigenständig, wie sie es gewichtet. Es ersetzt nicht die eigene Zulassungsentscheidung der Universität."},{question:"Garantiert ein gutes dMAT-Ergebnis die Zulassung?",answer:"Nein. Zulassungsentscheidungen werden von jeder deutschen Universität eigenständig getroffen — ein dMAT-Ergebnis garantiert kein Ergebnis in die eine oder andere Richtung."}]},{section:"G. Wen kontaktieren",items:[{question:"An wen wende ich mich bei APS-Fragen (Unterlagen, Ausnahmen, Zulassungsvoraussetzungen)?",answer:"Direkt an APS India: info@aps-india.de"},{question:"An wen wende ich mich bei dMAT-Fragen (Registrierung, Zahlung, Testtag, Ergebnisse)?",answer:"Direkt an g.a.s.t.: kontakt@gast.de"}]}];function ii({standalone:e=!1}){let[t,r]=(0,E.useState)(null),{lang:n}=nJ(),i=nQ[n].faq;return(0,_.jsxs)("div",{id:"faq",className:"bg-[var(--parchment)]",children:[(0,_.jsxs)("section",{className:`max-w-4xl mx-auto px-5 sm:px-8 pb-12 ${e?"pt-32 sm:pt-40":"pt-16 border-t border-[var(--rule)]"}`,children:[(0,_.jsx)("span",{className:"font-mono text-[11px] uppercase tracking-wide text-[var(--slate)]",children:i.kicker}),(0,_.jsx)("h1",{className:"font-display text-4xl sm:text-5xl text-[var(--ink)] mt-3 mb-5 max-w-2xl",children:i.title}),(0,_.jsx)("p",{className:"font-body text-[var(--slate)] leading-relaxed max-w-2xl mb-4",children:i.intro}),(0,_.jsx)(n8,{source:i.source})]}),(0,_.jsxs)("section",{className:"max-w-4xl mx-auto px-5 sm:px-8 pb-16",children:[("de"===n?ir:it).map(e=>(0,_.jsxs)("div",{className:"mb-10",children:[(0,_.jsx)("h2",{className:"font-display text-lg text-[var(--ink)] mb-4"  4 to matrix 5?',answer:"4 fields. The step size increases by 1 each time: 1, 2, 3, then 4.",note:'Modeled on the officially documented "x + 1" movement-increase rule for Figure Sequences.'},{type:"Latin Square",prompt:"In a column, the letters B, D, and E already appear in three of the five fields. Two fields remain unfilled, marked '?1' and '?2'. Given that '?1' cannot be A (ruled out by its row), which letters could correctly fill '?1' and '?2' between them?",answer:"A and C, in some order — since B, D, E are already used in that column, only A and C remain. Because '?1' can't be A (per its row), '?1' must be C and '?2' must be A.",note:"Modeled on the officially documented Latin Square task's multi-step elimination style, where you sometimes need to rule out one field before solving another."},{type:"Systems of Equations",prompt:"Solve for A and B: B = 2A, and A + B = 15.",answer:"A = 5, B = 10. Substituting B = 2A into the second equation: A + 2A = 15, so 3A = 15, A = 5. Then B = 2 × 5 = 10.",note:"Modeled on the officially documented Systems of Equations task, which uses substitution between two equations."}]},{id:"set-3",title:"Practice Set 3",questions:[{type:"Figure Sequences",prompt:"A circle changes colour in a fixed cycle: red → blue → green → red → blue → green, one change per matrix. If it's blue in matrix 1, what colour is it in matrix 5?",answer:"Green. The cycle is blue → green → red → blue → green as each matrix advances one step: matrix 1 = blue, matrix 2 = green, matrix 3 = red, matrix 4 = blue, matrix 5 = green.",note:"Modeled on the officially documented Figure Sequences task, which includes colour-cycling rules alongside positional movement."},{type:"Latin Square",prompt:"In a 5×5 grid, one row already contains A, C, D, and E filled correctly. A second, separate row contains B, C, D, and E filled correctly. What letter is missing from each of these two rows respectively?",answer:"First row is missing B (since A, C, D, E are used, only B remains). Second row is missing A (since B, C, D, E are used, only A remains).",note:"Modeled on the officially documented Latin Square task, extended here to compare two independent rows solved the same way."},{type:"Systems of Equations",prompt:"Solve for A and B: A − 3 = 11, and B = A + 9.",answer:"A = 14, B = 23. From the first equation, A = 11 + 3 = 14. Substituting into the second: B = 14 + 9 = 23.",note:"Modeled on the officially documented Systems of Equations task, sequencing two simple equations to solve in order."}]},{id:"set-4",title:"Practice Set 4",questions:[{type:"Figure Sequences",prompt:"A dot bounces between the top and bottom edge of a matrix, reversing direction each time it hits an edge, moving 1 row per step. Starting at the top edge (row 1 of 4), which row is it in after 5 steps?",answer:"Row 2. The sequence of rows is: 1 (start) → 2 → 3 → 4 (hits bottom, reverses) → 3 → 2. After 5 steps from the start, it's at row 2.",note:"Modeled on the officially documented symbol-movement task, which includes bounce/direction-reversal rules along a shape's edge."},{type:"Latin Square",prompt:"In a 5×5 grid, one row contains A, C, D, and E filled in four of the five positions. Which letter must go in the fifth, marked field?",answer:"B — the same elimination rule applies: since A, C, D, and E already each appear once in the row, B is the only remaining letter.",note:"Modeled on the officially documented Latin Square task's single-missing-letter format."},{type:"Systems of Equations",prompt:"Solve for A and B: 2A + B = 18, and A = B.",answer:"A = 6, B = 6. Since A = B, substitute B for A in the first equation: 2A + A = 18, so 3A = 18, A = 6. Since A = B, B = 6 too.",note:"Modeled on the officially documented Systems of Equations task, using an equality constraint between the two variables."}]},{id:"set-5",title:"Practice Set 5",questions:[{type:"Figure Sequences",prompt:"A star grows by one point each matrix, starting at 3 points in matrix 1. If this pattern continues, how many points does it have in matrix 4?",answer:"6 points. Matrix 1 = 3, matrix 2 = 4, matrix 3 = 5, matrix 4 = 6 — one point added each step.",note:"Modeled on the officially documented Figure Sequences task, which includes shape-transformation rules like changing point count, not just movement."},{type:"Latin Square",prompt:"In a 5×5 grid, a row contains B, C, D, and E filled in four of the five positions. Which letter must go in the fifth, marked field?",answer:"A — since B, C, D, and E already appear once each in that row, A is the only letter left to complete it.",note:"Modeled on the officially documented Latin Square task's single-missing-letter format, applied to a different starting set of filled letters."},{type:"Systems of Equations",prompt:"Solve for A and B: B − A = 10, and B = 2A + 1.",answer:"A = 9, B = 19. Substituting B = 2A + 1 into the first equation: (2A + 1) − A = 10, so A + 1 = 10, A = 9. Then B = 2 × 9 + 1 = 19.",note:"Modeled on the officially documented Systems of Equations task, combining substitution with a slightly longer solving chain."}]}],i_=[{id:"set-1",title:"Übungsset 1",questions:[{type:"Figure Sequences",prompt:"Ein blaues Quadrat startet oben links in einem 2×2-Feldraster (innerhalb einer größeren Matrix) und bewegt sich mit jedem Schritt ein Feld im Uhrzeigersinn weiter. Wo befindet es sich nach 3 Schritten ab der Startposition oben links?",answer:"Unten links. Im Uhrzeigersinn ab oben links: Schritt 1 → oben rechts, Schritt 2 → unten rechts, Schritt 3 → unten links.",note:"Basiert auf der offiziell dokumentierten Bildfolgen-Aufgabe, bei der sich Figuren nach einer festgelegten Regel über mehrere Matrizen hinweg bewegen, drehen oder die Farbe wechseln."},{type:"Latin Square",prompt:"In einem 5×5-Raster kommt jeder der Buchstaben A–E genau einmal pro Zeile und Spalte vor. In einer Zeile sind bereits A, C, D und E in vier der fünf Positionen eingetragen. Welcher Buchstabe muss in das fünfte, markierte Feld?",answer:"B —  = 10.",note:"Basiert auf der offiziell dokumentierten Gleichungssysteme-Aufgabe, die Einsetzung zwischen zwei Gleichungen verwendet."}]},{id:"set-3",title:"Übungsset 3",questions:[{type:"Figure Sequences",prompt:"Ein Kreis wechselt die Farbe in einem festen Zyklus: rot → blau → grün → rot → blau → grün, ein Wechsel pro Matrix. Wenn er in Matrix 1 blau ist, welche Farbe hat er in Matrix 5?",answer:"Grün. Der Zyklus verläuft blau → grün → rot → blau → grün mit jedem Schritt: Matrix 1 = blau, Matrix 2 = grün, Matrix 3 = rot, Matrix 4 = blau, Matrix 5 = grün.",note:"Basiert auf der offiziell dokumentierten Bildfolgen-Aufgabe, die neben der Positionsänderung auch Farbwechsel-Zyklen umfasst."},{type:"Latin Square",prompt:"In einem 5×5-Raster enthält eine Zeile bereits korrekt A, C, D und E. Eine zweite, unabhängige Zeile enthält korrekt B, C, D und E. Welcher Buchstabe fehlt jeweils in diesen beiden Zeilen?",answer:"In der ersten Zeile fehlt B (da A, C, D, E bereits verwendet werden, bleibt nur B). In der zweiten Zeile fehlt A (da B, C, D, E bereits verwendet werden, bleibt nur A).",note:"Basiert auf der offiziell dokumentierten Lateinisches-Quadrat-Aufgabe, hier erweitert um den Vergleich zweier unabhängiger, auf gleiche Weise gelöster Zeilen."},{type:"Systems of Equations",prompt:"Löse nach A und B auf: A − 3 = 11, und B = A + 9.",answer:"A = 14, B = 23. Aus der ersten Gleichung: A = 11 + 3 = 14. Eingesetzt in die zweite: B = 14 + 9 = 23.",note:"Basiert auf der offiziell dokumentierten Gleichungssysteme-Aufgabe, bei der zwei einfache Gleichungen nacheinander gelöst werden."}]},{id:"set-4",title:"Übungsset 4",questions:[{type:"Figure Sequences",prompt:"Ein Punkt springt zwischen dem oberen und unteren Rand einer Matrix hin und her, kehrt bei jedem Randkontakt die Richtung um und bewegt sich dabei 1 Zeile pro Schritt. Er startet am oberen Rand (Zeile 1 von 4) — in welcher Zeile befindet er sich nach 5 Schritten?",answer:"Zeile 2. Die Zeilenfolge lautet: 1 (Start) → 2 → 3 → 4 (erreicht den unteren Rand, kehrt um) → 3 → 2. Nach 5 Schritten ab dem Start befindet er sich in Zeile 2.",note:"Basiert auf der offiziell dokumentierten Symbolbewegungs-Aufgabe, die Sprung-/Richtungswechselregeln entlang eines Randes umfasst."},{type:"Latin Square",prompt:"In einem 5×5-Raster enthält eine Zeile bereits A, C, D und E in vier der fünf Positionen. Welcher Buchstabe muss in das fünfte, markierte Feld?",answer:"B — dieselbe Ausschlussregel gilt: Da A, C, D und E bereits je einmal in der Zeile vorkommen, bleibt nur B als letzter Buchstabe übrig.",note:"Basiert auf dem Einzel-Fehlbuchstaben-Format der offiziell dokumentierten Lateinisches-Quadrat-Aufgabe."},{type:"Systems of Equations",prompt:"Löse nach A und B auf: 2A + B = 18, und A = B.",answer:"A = 6, B = 6. Da A = B, setze B für A in die erste Gleichung ein: 2A + A = 18, also 3A = 18, A = 6. Da A = B, ist auch B = 6.",note:"Basiert auf der offiziell dokumentierten Gleichungssysteme-Aufgabe, die eine Gleichheitsbedingung zwischen den beiden Variablen nutzt."}]},{id:"set-5",title:"Übungsset 5",questions:[{type:"Figure Sequences",prompt:"Ein Stern wächst mit jeder Matrix um eine Zacke, beginnend mit 3 Zacken in Matrix 1. Wenn sich dieses Muster fortsetzt, wie viele Zacken hat er in Matrix 4?",answer:"6 Zacken. Matrix 1 = 3, Matrix 2 = 4, Matrix 3 = 5, Matrix 4 = 6 — mit jedem Schritt kommt eine Zacke hinzu.",note:"Basiert auf der offiziell dokumentierten Bildfolgen-Aufgabe, die auch Formveränderungsregeln wie eine sich ändernde Zackenzahl umfasst, nicht nur Bewegung."},{type:"Latin Square",prompt:"In einem 5×5-Raster enthält eine Zeile B, C, D und E in vier der fünf Positionen. Welcher Buchstabe muss in das fünfte, markierte Feld?",answer:"A — da B, C, D und E bereits je einmal in dieser Zeile vorkommen, bleibt nur A übrig, um sie zu vervollständigen.",note:"Basiert auf dem Einzel-Fehlbuchstaben-Format der offiziell dokumentierten Lateinisches-Quadrat-Aufgabe, hier angewendet auf eine andere Ausgan clock",[["circle",{cx:"12",cy:"12",r:"10",key:"1mglay"}],["path",{d:"M12 6v6l4 2",key:"mmk7yg"}]]),iq=[{slug:"what-is-dmat",title:"What the dMAT Actually Is (And What It Isn't)",dek:"A plain-language breakdown of Germany's new academic aptitude test for Indian Master's applicants — sourced directly from APS India and g.a.s.t.",date:"02 July 2026",readTime:"5 min read",body:`
      <p style="margin-bottom:16px;">If you're applying for a Master's programme in Germany from India, you've probably started seeing the term "dMAT" show up alongside your APS paperwork. Here's what it actually is, based only on what APS India and g.a.s.t. (the organisation that runs it) have published.</p>

      <p style="margin-bottom:16px;"><strong>dMAT stands for Digital Master Test.</strong> It's a standardised academic aptitude test, introduced from 2026 as a new additional element in the APS documentation and verification process for Indian graduates applying to German Master's programmes.</p>

      <p style="margin-bottom:8px;"><strong>Who runs it, and who verifies your documents</strong></p>
      <p style="margin-bottom:16px;">Two different organisations are involved, and it matters which one you contact for what. <strong>g.a.s.t.</strong> (Gesellschaft f\xfcr Akademische Studienvorbereitung und Testentwicklung) administers the test itself \u{2014} registration, payment, test centres, and results. <strong>APS India</strong> remains solely responsible for verifying the authenticity and formal plausibility of your academic documents, exactly as it always has. The dMAT is layered on top of that process, not a replacement for it.</p>

      <p style="margin-bottom:8px;"><strong>How the test is structured</strong></p>
      <p style="margin-bottom:16px;">According to d-mat.de, the dMAT consists of two modules: a <strong>core module</strong>, which measures general cognitive and analytical skills across three subtests, and a <strong>subject module</strong> \u{2014} for the India/APS pathway, this is the "General Academic Module," which tests your ability to apply those cognitive skills to academic problem-solving rather than testing memorised factual knowledge.</p>
      <p style="margin-bottom:16px;">One honest gap here: the official site doesn't publicly break down exactly what the three core-module subtests cover. If you see a site (including ours) describing specific task types like pattern-matching or sequence puzzles, check whether that claim is sourced to an official g.a.s.t. document or just a third party's description \u{2014} we've tried to keep that distinction clear on our own Practice page.</p>

      <p style="margin-bottom:8px;"><strong>Who actually needs to take it</strong></p>
      <p style="margin-bottom:16px;">In this introductory phase, the dMAT applies only if your undergraduate degree is in <strong>Engineering, Commerce/Accounting/Finance/Economics, or Business/Management</strong>, and only if you're applying for the <strong>Summer Semester 2027 intake or later</strong>. If your field is outside those three groups, or you're applying for Winter 2026/27, this doesn't currently apply to you.</p>

      <p style="margin-bottom:8px;"><strong>What it doesn't do</strong></p>
      <p style="margin-bottom:16px;">The dMAT certificate doesn't replace APS document verification, doesn't replace anabin recognition of your university, and doesn't replace a German university's admission decision. It's an additional data point referenced on your APS certificate \u{2014} not a pass/fail gate on its own.</p>

      <p>Sources: <a href="https://www.d-mat.de/en/dmat-in-india/" target="_blank" rel="noopener noreferrer" style="text-decoration:underline;">d-mat.de/en/dmat-in-india</a>, <a href="https://aps-india.de/dmat/" target="_blank" rel="noopener noreferrer" style="text-decoration:underline;">aps-india.de/dmat</a>. Checked 02 July 2026.</p>
    `},{slug:"does-my-degree-count",title:"Does Your Degree Actually Count? The Field List Has Real Surprises",dek:"APS India published a detailed field-classification guide — and it excludes several degrees people assume are covered, including standalone Computer Science and BCA.",date:"02 July 2026",readTime:"6 min read",body:`
      <p style="margin-bottom:16px;">"Engineering, Commerce, Business/Management" sounds simple until you try to place your actual degree title into one of those three buckets. APS India published an official field-classification PDF on 29 June 2026 to resolve exactly this kind of ambiguity, and it's more specific \u{2014} and in places more restrictive \u{2014} than most summaries suggest.</p>

      <p style="margin-bottom:8px;"><strong>The big one: standalone Computer Science is NOT automatically covered</strong></p>
      <p style="margin-bottom:16px;">This surprises a lot of people. According to the official field list, <strong>Computer Science and Engineering, Computer Engineering, Information Science and Engineering,</strong> and <strong>Information Technology and Engineering</strong> are covered. But <strong>standalone Computer Science, BCA, Computer Applications, IT, AI, Data Science, and Cyber Security are explicitly listed as NOT automatically covered</strong> \u{2014} unless APS India separately classifies your specific degree title as Engineering, Commerce, Finance, Economics, Business, or Management.</p>

      <p style="margin-bottom:8px;"><strong>B.Tech alone doesn't guarantee coverage</strong></p>
      <p style="margin-bottom:16px;">The list is explicit: a B.Tech is only covered if the official branch or specialisation is clearly Engineering \u{2014} Mechanical, Civil, Computer Science and Engineering, Electronics and Communication Engineering, and similar. "B.Tech" as a label by itself doesn't automatically include every Technology field under it.</p>

      <p style="margin-bottom:8px;"><strong>Sector-specific "Management" degrees need separate assessment</strong></p>
      <p style="margin-bottom:16px;">Having the word "Management" in your degree title isn't enough on its own. The list specifically calls out <strong>Hotel Management, Hospitality Management, Tourism Management, Aviation Management, Healthcare Management, and Hospital Administration</strong> as fields requiring individual, separate formal assessment by APS India \u{2014} they are not automatically included just because "Management" appears in the title.</p>

      <p style="margin-bottom:8px;"><strong>Also explicitly excluded (unless separately classified)</strong></p>
      <p style="margin-bottom:16px;">Biotechnology without an Engineering designation, B.Sc. Biotechnology, Microbiology, Life Sciences, Food Technology (as opposed to Food Engineering), Textile Technology (as opposed to Textile Engineering), Architecture, Pharmacy, Agriculture (unless Agricultural Engineering), Law, Medical/Nursing degrees, and general Arts/Humanities/Social Sciences fields (aside from Economics) are all listed as not automatically covered.</p>

      <p style="margin-bottom:8px;"><strong>The rule that matters most</strong></p>
      <p style="margin-bottom:16px;">Per the official guidance: <em>"The official wording on the degree certificate, transcript, marksheets or university documents is decisive. Marketing descriptions, intended Master's programmes or informal course descriptions are not sufficient on their own."</em> In other words \u{2014} what your actual degree certificate says, not what your college called the programme colloquially, is what counts.</p>

      <p style="margin-bottom:16px;">If your field sits anywhere near a borderline case, don't guess based on a summary (including this one) \u{2014} check the full official list, and when in doubt, contact APS India directly at <a href="mailto:info@aps-india.de" style="text-decoration:underline;">info@aps-india.de</a>.</p>

      <p>Source: <a href="https://aps-india.de/wp-content/uploads/2026/06/dMAT_India_Affected_Fields_List.pdf" target="_blank" rel="noopener noreferrer" style="text-decoration:underline;">APS India dMAT Affected Fields List, Version 1.0, 29 June 2026</a>. Fetched and checked 02 July 2026.</p>
    `},{slug:"am-i-exempt",title:"Four Ways You Might Already Be Exempt From the dMAT",dek:"If your APS process was already underway before 29 June 2026, this new requirement likely doesn't touch you. Here's exactly how the exemptions work.",date:"02 July 2026",readTime:"4 min read",body:`
      <p style="margin-bottom:16px;">A lot of anxiety about the dMAT comes from not knowing whether it applies to an application that's already in progress. APS India's official notice lays out the exemptions clearly \u{2014} here they are, one at a time.</p>

      <p style="margin-bottom:8px;"><strong>1. You registered for APS online before 29 June 2026</strong></p>
      <p style="margin-bottom:16px;">If you completed your APS online registration before that date, you're exempt from the dMAT requirement for that specific APS procedure \u{2014} even if you haven't shipped your physical documents yet.</p>

      <p style="margin-bottom:8px;"><strong>2. You shipped your APS documents before 29 June 2026</strong></p>
      <p style="margin-bottom:16px;">If your complete APS application documents were already shipped before that date, you're exempt \u{2014} even if APS verification is still ongoing and you haven't received your certificate yet. Keep proof of shipment in case it's requested.</p>

      <p style="margin-bottom:8px;"><strong>3. You already have your APS certificate</strong></p>
      <p style="margin-bottom:16px;">If you've already completed the APS procedure and received your certificate, you don't need to take the dMAT for that completed procedure at all.</p>

      <p style="margin-bottom:8px;"><strong>4. You're on an exchange, double-degree, or partnership programme</strong></p>
      <p style="margin-bottom:16px;">If you're applying through an officially confirmed exchange programme, double-degree programme, or university partnership programme, you're exempt \u{2014} submit the relevant confirmation from your home institution, the German partner institution, or the programme coordinator alongside your APS documentation.</p>

      <p style="margin-bottom:8px;"><strong>What if I apply again later?</strong></p>
      <p style="margin-bottom:16px;">One nuance worth flagging: these exemptions apply to your <em>current</em> APS procedure. If you submit a brand-new APS application at a later stage, the rules in force at that later date will apply \u{2014} not the ones that applied when you first registered.</p>

      <p style="margin-bottom:16px;">And one more timing point that resolves a common question: if you're applying for the <strong>Winter Semester 2026/27</strong> intake, the dMAT doesn't affect you regardless of your field, simply because the first dMAT certificates aren't issued until 12 October 2026 \u{2014} after most Winter 2026/27 deadlines have passed. The requirement is built around the Summer 2027 intake and beyond.</p>

      <p>Source: <a href="https://aps-india.de/dmat/" target="_blank" rel="noopener noreferrer" style="text-decoration:underline;">aps-india.de/dmat</a>, official notice published 29 June 2026, updated 30 June 2026. Checked 02 July 2026.</p>
    `},{slug:"dmat-dates-fees-centres",title:"dMAT Dates, Fees, and Test Centres: The First Sitting, at a Glance",dek:"Everything confirmed about the September 2026 test window — registration deadlines, cost, and where you can actually sit the exam.",date:"02 July 2026",readTime:"3 min read",body:`
      <p style="margin-bottom:16px;">If you've already confirmed the dMAT applies to you, here's the practical timeline and logistics for the first sitting in India \u{2014} all confirmed directly from d-mat.de and APS India.</p>

      <p style="margin-bottom:8px;"><strong>Key dates</strong></p>
      <ul style="margin-bottom:16px; padding-left:20px;">
        <li style="margin-bottom:6px;"><strong>29 June 2026</strong> \u{2014} Registration opens</li>
        <li style="margin-bottom:6px;"><strong>15 September 2026</strong> \u{2014} Registration deadline</li>
        <li style="margin-bottom:6px;"><strong>26 September 2026</strong> \u{2014} Test date</li>
        <li><strong>12 October 2026</strong> \u{2014} Results published and certificate issued via the g.a.s.t. portal</li>
      </ul>

      <p style="margin-bottom:8px;"><strong>Cost</strong></p>
      <p style="margin-bottom:16px;">The dMAT test fee is <strong>\u{20AC}150</strong>, payable during registration directly through g.a.s.t. Refund conditions exist for certain circumstances \u{2014} check the terms shown during registration on the official g.a.s.t. site before you pay.</p>

      <p style="margin-bottom:8px;"><strong>Where you can sit the test</strong></p>
      <p style="margin-bottom:16px;">For this first administration, g.a.s.t. test centres are planned across ten cities: <strong>Ahmedabad, Bengaluru, Bhopal, Chandigarh, Chennai, Kolkata, Mananthavady, Mumbai, New Delhi, and Pune.</strong> The final, confirmed list of available centres is shown during the registration process itself \u{2014} availability depends on seats remaining at each location, and g.a.s.t. cannot reserve a seat for you in advance. It's first come, first served.</p>

      <p style="margin-bottom:8px;"><strong>Who handles what</strong></p>
      <p style="margin-bottom:16px;">Registration, payment, test centre booking, technical support, and certificate issuance are all handled directly by g.a.s.t., not APS India. If you have a registration or technical problem, contact g.a.s.t. directly at <a href="mailto:kontakt@gast.de" style="text-decoration:underline;">kontakt@gast.de</a> rather than APS India.</p>

      <p style="margin-bottom:16px;">One useful piece of context: g.a.s.t. is the same organisation behind TestDaF and TestAS, two other established German academic tests \u{2014} so this isn't a brand-new, unproven administrator; it's an existing test body extending into a new test format.</p>

      <p>Sources: <a href="https://www.d-mat.de/en/dmat-in-india/" target="_blank" rel="noopener noreferrer" style="text-decoration:underline;">d-mat.de/en/dmat-in-india</a>, <a href="https://aps-india.de/dmat/" target="_blank" rel="noopener noreferrer" style="text-decoration:underline;">aps-india.de/dmat</a>. Checked 02 July 2026. Dates and fees are for the first 2026 sitting and can change \u{2014} always confirm on the official registration page before paying.</p>
    `},{slug:"dmat-vs-testas-vs-testdaf",title:"dMAT vs. TestAS vs. TestDaF: Which Test Do You Actually Need?",dek:"Three different g.a.s.t. tests, three different purposes. Here's what separates a mandatory APS requirement from an optional aptitude test from a language certificate.",date:"03 July 2026",readTime:"4 min read",body:`
      <p style="margin-bottom:16px;">If you're researching German university admissions, you'll run into three g.a.s.t.-administered tests with similar-sounding names. They test different things, for different purposes, and \u{2014} critically \u{2014} only one of them is mandatory for the applicants this site covers.</p>

      <p style="margin-bottom:8px;"><strong>g.a.s.t. runs all three, plus a fourth</strong></p>
      <p style="margin-bottom:16px;">According to g.a.s.t.'s own site, the organisation (a registered nonprofit) administers four products: TestDaF and onSET (German language proficiency), TestAS (general academic aptitude), and dMAT (the newest, a digital Master's-level aptitude test). All are separate exams with separate registrations, fees, and purposes.</p>

      <p style="margin-bottom:8px;"><strong>TestDaF \u{2014} tests your German language ability</strong></p>
      <p style="margin-bottom:16px;">TestDaF is described by g.a.s.t. as the only standardised language test specifically for German university access, recognised nationwide by German universities as proof of German language proficiency. It's available at 500+ licensed centres in 100+ countries. This is a language test \u{2014} it has nothing to do with academic aptitude or subject knowledge. If your programme is taught in English, you may not need it at all; that depends on the individual university and programme, not something this site can determine for you.</p>

      <p style="margin-bottom:8px;"><strong>TestAS \u{2014} a general and subject-specific aptitude test, separate and optional</strong></p>
      <p style="margin-bottom:16px;">TestAS is described officially as a centralised, standardised aptitude test measuring general cognitive skills and subject-group-specific competencies, intended to help predict study success independent of the applicant's home education and grading system. Unlike the dMAT, TestAS is <strong>not tied to the APS process</strong> \u{2014} it's a separate, optional test that individual universities may or may not request. If a specific programme you're applying to asks for TestAS, that requirement exists independently of whether the dMAT also applies to you.</p>

      <p style="margin-bottom:8px;"><strong>dMAT \u{2014} mandatory, inside the APS process, for specific fields only</strong></p>
      <p style="margin-bottom:16px;">The dMAT is different from both of the above in one key way: for applicants in the affected fields (Engineering, Commerce/Finance/Economics, Business/Management) applying from Summer 2027 intake onward, it isn't optional \u{2014} it's a required part of the APS documentation process specifically for Indian graduates, introduced from 2026.</p>

      <p style="margin-bottom:8px;"><strong>The practical takeaway</strong></p>
      <p style="margin-bottom:16px;">These three tests can all apply to the same applicant simultaneously, for different reasons: TestDaF if your programme requires German language proof, TestAS if a specific university asks for it, and dMAT if your field and intake make it mandatory under the APS process. Check each requirement separately \u{2014} passing one doesn't satisfy another.</p>

      <p>Sources: <a href="https://www.gast.de/de/" target="_blank" rel="noopener noreferrer" style="text-decoration:underline;">gast.de</a> (official g.a.s.t. site, TestDaF/TestAS/dMAT product pages). Checked 03 July 2026.</p>
    `},{slug:"anabin-and-your-degree",title:"Why anabin Matters More Than Your dMAT Score",dek:"A high dMAT result can't fix a degree from an institution anabin doesn't recognise. Here's what anabin actually is and why you should check it first.",date:"03 July 2026",readTime:"3 min read",body:`
      <p style="margin-bottom:16px;">Of everything covered on this site, this is the one point worth repeating on its own: <strong>the dMAT cannot fix an anabin problem.</strong> If your institution's recognition status is unclear, sort that out before worrying about the dMAT at all.</p>

      <p style="margin-bottom:8px;"><strong>What anabin actually is</strong></p>
      <p style="margin-bottom:16px;">anabin is the database maintained by Germany's Kultusministerkonferenz (KMK) \u{2014} the Standing Conference of the Education Ministers of the German states \u{2014} via its Central Office for Foreign Education (ZAB). It's a searchable database of institutions and degree recognition statuses, directly confirmed as the official government tool for checking whether a foreign university is recognised in Germany.</p>

      <p style="margin-bottom:16px;">You can search it directly at <a href="https://anabin.kmk.org/db/institutionen" target="_blank" rel="noopener noreferrer" style="text-decoration:underline;">anabin.kmk.org/db/institutionen</a> \u{2014} search by country, city, or institution name.</p>

      <p style="margin-bottom:8px;"><strong>Why this matters more than test scores</strong></p>
      <p style="margin-bottom:16px;">Per APS India's own guidance (covered in more detail in our other posts), a dMAT certificate does not replace anabin recognition or the formal assessment of your higher education entrance requirements. If your previous institution shows an unclear or restricted status, taking the dMAT \u{2014} even scoring well \u{2014} does not change that status or make your degree eligible for APS certification or German admission on its own.</p>

      <p style="margin-bottom:16px;">In practical terms: check anabin <em>before</em> you register for the dMAT and before you submit your APS application, not after. If there's a problem with your institution's recognition, resolving that is a separate process from anything the dMAT or APS touches directly.</p>

      <p style="margin-bottom:8px;"><strong>What we can't tell you</strong></p>
      <p style="margin-bottom:16px;">We can't look up your specific institution's status for you, and we won't guess at what a particular status code means for your case \u{2014} anabin's own database and its FAQ section are the authoritative source, and specific recognition questions are ultimately a matter for APS India or the relevant German authority to confirm, not something a summary article can settle.</p>

      <p>Source: <a href="https://anabin.kmk.org/db/institutionen" target="_blank" rel="noopener noreferrer" style="text-decoration:underline;">anabin.kmk.org</a>, the official KMK/ZAB database. Checked 03 July 2026.</p>
    `},{slug:"aps-vs-gast-who-does-what",title:"APS India or g.a.s.t.? Who to Actually Contact for What",dek:"Two organisations, two different jobs, two different inboxes. A quick reference so you email the right one the first time.",date:"03 July 2026",readTime:"3 min read",body:`
      <p style="margin-bottom:16px;">A recurring source of confusion: APS India and g.a.s.t. are two separate organisations doing two separate jobs, and mixing them up wastes time. Here's a clean breakdown.</p>

      <p style="margin-bottom:8px;"><strong>APS India \u{2014} document verification</strong></p>
      <p style="margin-bottom:16px;">APS India (the Academic Evaluation Centre) is responsible for verifying the authenticity and formal plausibility of your academic documents. This is the process that existed before the dMAT and continues unchanged. Contact APS India for: document verification status, APS certificate questions, exemption eligibility, and general questions about your APS application file.</p>
      <p style="margin-bottom:16px;">Email: <a href="mailto:info@aps-india.de" style="text-decoration:underline;">info@aps-india.de</a></p>

      <p style="margin-bottom:8px;"><strong>g.a.s.t. \u{2014} test administration</strong></p>
      <p style="margin-bottom:16px;">g.a.s.t. (Gesellschaft f\xfcr Akademische Studienvorbereitung und Testentwicklung), confirmed as a nonprofit organisation on its own site, administers the dMAT test itself \u{2014} registration, payment, test centre booking, technical requirements, and results. Contact g.a.s.t. for: registration problems, payment issues, test centre availability, technical difficulties on test day, and certificate/result download issues.</p>
      <p style="margin-bottom:16px;">Email: <a href="mailto:kontakt@gast.de" style="text-decoration:underline;">kontakt@gast.de</a></p>

      <p style="margin-bottom:8px;"><strong>Why the split matters</strong></p>
      <p style="margin-bottom:16px;">Because these are separate organisations, APS India cannot resolve g.a.s.t. registration issues, and g.a.s.t. cannot answer questions about your document verification status or APS certificate. Sending the wrong query to the wrong organisation just means a delay while it gets redirected \u{2014} going straight to the right one saves time.</p>

      <p style="margin-bottom:8px;"><strong>A useful mental shortcut</strong></p>
      <p style="margin-bottom:16px;">If your question is about whether your <em>documents</em> are being processed correctly, that's APS India. If your question is about whether your <em>test</em> is booked, paid for, or scored correctly, that's g.a.s.t. The dMAT certificate itself is issued by g.a.s.t., but it becomes part of your APS documentation once submitted \u{2014} so the certificate crosses both worlds, even though each organisation only controls its own half.</p>

      <p>Sources: <a href="https://aps-india.de/dmat/" target="_blank" rel="noopener noreferrer" style="text-decoration:underline;">aps-india.de/dmat</a>, <a href="https://www.gast.de/de/" target="_blank" rel="noopener noreferrer" style="text-decoration:underline;">gast.de</a>. Checked 03 July 2026.</p>
    `},{slug:"exchange-programme-exemption-explained",title:"On an Exchange or Double-Degree Programme? You're Likely Exempt",dek:"One of the four dMAT exemptions is easy to miss if you're not actively looking for it. Here's exactly what qualifies and what to submit.",date:"03 July 2026",readTime:"3 min read",body:`
      <p style="margin-bottom:16px;">Among the dMAT's exemptions, the exchange/partnership-programme exemption is the one most likely to be overlooked, since it's not about timing (like the 29 June 2026 cutoff) \u{2014} it's about the type of programme you're on.</p>

      <p style="margin-bottom:8px;"><strong>What qualifies</strong></p>
      <p style="margin-bottom:16px;">Per APS India's official guidance, applicants participating in <strong>officially confirmed exchange programmes, double-degree programmes, or university partnership programmes</strong> are exempt from the dMAT requirement \u{2014} regardless of their field of study or intake semester.</p>

      <p style="margin-bottom:8px;"><strong>What "officially confirmed" means in practice</strong></p>
      <p style="margin-bottom:16px;">This isn't a self-declaration. To use this exemption, you need to submit the relevant confirmation from one of: your home institution, the German partner institution, or the programme coordinator \u{2014} and this confirmation should include your group number. Submit this documentation alongside your APS documentation, not as a separate, later step.</p>

      <p style="margin-bottom:8px;"><strong>Why this exemption exists</strong></p>
      <p style="margin-bottom:16px;">Exchange and double-degree students are typically admitted through pre-established institutional agreements rather than the standard individual application process \u{2014} the partner institutions have already agreed on the academic standards and equivalencies involved, which is presumably why this category sits outside the dMAT's scope. (This reasoning is our own inference from the structure of the exemption, not a stated justification from APS India \u{2014} we haven't found an official explanation of the policy's rationale.)</p>

      <p style="margin-bottom:8px;"><strong>If you're not sure your programme qualifies</strong></p>
      <p style="margin-bottom:16px;">"Partnership programme" can cover a range of institutional arrangements, and we don't have a way to determine from here whether your specific programme counts. If there's any doubt, the safest step is confirming directly with your coordinating institution and, if needed, with APS India at <a href="mailto:info@aps-india.de" style="text-decoration:underline;">info@aps-india.de</a> before assuming the exemption applies.</p>

      <p>Source: <a href="https://aps-india.de/dmat/" target="_blank" rel="noopener noreferrer" style="text-decoration:underline;">aps-india.de/dmat</a>, official APS India notice. Checked 03 July 2026.</p>
    `},{slug:"what-happens-after-you-submit-dmat",title:"You've Taken the dMAT — What Actually Happens Next?",dek:"Your certificate is issued, it lands on your APS file, and then what? Here's the process after the test, based only on what's officially confirmed so far.",date:"03 July 2026",readTime:"3 min read",body:`
      <p style="margin-bottom:16px;">Most guidance focuses on preparing for and registering for the dMAT. Less is written about what happens structurally once you've actually taken it. Here's what's officially confirmed, and where the confirmed information currently stops.</p>

      <p style="margin-bottom:8px;"><strong>Step 1 \u{2014} Certificate issuance</strong></p>
      <p style="margin-bottom:16px;">For the first 2026 sitting, certificates become available online via the g.a.s.t. test-takers' portal from 12 October 2026. You'll have received portal access details when you registered \u{2014} keep those login details, since that's how you retrieve your certificate.</p>

      <p style="margin-bottom:8px;"><strong>Step 2 \u{2014} Submission to APS India</strong></p>
      <p style="margin-bottom:16px;">The dMAT certificate must be submitted together with your other APS application documents. If you registered for APS on or after 29 June 2026 and the dMAT applies to you, you're permitted to submit your other documents first and add the dMAT certificate once it's available \u{2014} but APS India can only treat your procedure as complete once the certificate is in.</p>

      <p style="margin-bottom:8px;"><strong>Step 3 \u{2014} Reflected on your APS certificate</strong></p>
      <p style="margin-bottom:16px;">Per APS India's guidance, your dMAT result will be noted on your APS certificate once issued, alongside the standard document verification outcome. A low dMAT score does not, on its own, cause your APS certificate to be refused \u{2014} APS India has stated this explicitly.</p>

      <p style="margin-bottom:8px;"><strong>Step 4 \u{2014} Universities see it, and decide independently</strong></p>
      <p style="margin-bottom:16px;">Once your APS certificate (with the dMAT result noted) goes to German universities as part of your application, each university decides independently how much weight to give the result. It doesn't replace their own admission decision-making process.</p>

      <p style="margin-bottom:8px;"><strong>What's not yet clear</strong></p>
      <p style="margin-bottom:16px;">We have not found official documentation describing a formal retake policy, how many attempts are permitted, or whether scores expire after a certain period. If these details matter to your specific situation, they're worth confirming directly with g.a.s.t. at <a href="mailto:kontakt@gast.de" style="text-decoration:underline;">kontakt@gast.de</a> rather than assuming an answer \u{2014} we're not going to guess at policy details we haven't seen documented.</p>

      <p>Sources: <a href="https://aps-india.de/dmat/" target="_blank" rel="noopener noreferrer" style="text-decoration:underline;">aps-india.de/dmat</a>, <a href="https://www.d-mat.de/en/dmat-in-india/" target="_blank" rel="noopener noreferrer" style="text-decoration:underline;">d-mat.de/en/dmat-in-india</a>. Checked 03 July 2026.</p>
    `},{slug:"five-dmat-misconceptions",title:"Five Things People Get Wrong About the dMAT",dek:"From 'it's basically GATE' to 'a low score kills my application' — the misconceptions we keep seeing, corrected against the official record.",date:"03 July 2026",readTime:"4 min read",body:`
      <p style="margin-bottom:16px;">Since the dMAT is new, a lot of secondhand summaries and forum posts are circulating \u{2014} some accurate, some not. Here are five specific misconceptions worth correcting directly against official sources.</p>

      <p style="margin-bottom:8px;"><strong>Misconception 1: "It's a memorised-knowledge exam, like GATE or an MBA entrance test"</strong></p>
      <p style="margin-bottom:16px;"><strong>Not accurate.</strong> Official descriptions consistently frame the dMAT as testing general cognitive and analytical reasoning \u{2014} how you think and solve problems \u{2014} rather than testing memorised subject facts. There's no traditional subject-wise syllabus to memorise the way there is for exams like GATE.</p>

      <p style="margin-bottom:8px;"><strong>Misconception 2: "A low score means my APS certificate gets rejected"</strong></p>
      <p style="margin-bottom:16px;"><strong>Not accurate.</strong> APS India has stated explicitly that the dMAT is not a stand-alone pass/fail test for APS purposes, and a low score does not automatically lead to a refusal of the APS certificate.</p>

      <p style="margin-bottom:8px;"><strong>Misconception 3: "It replaces TestAS or TestDaF"</strong></p>
      <p style="margin-bottom:16px;"><strong>Not accurate.</strong> These are three separate g.a.s.t. products serving different purposes \u{2014} language proficiency (TestDaF), general academic aptitude for university admission generally (TestAS), and this new APS-linked requirement (dMAT). Passing one doesn't satisfy a requirement for another; see our dedicated comparison post for the full breakdown.</p>

      <p style="margin-bottom:8px;"><strong>Misconception 4: "It applies to everyone applying to a German Master's from India"</strong></p>
      <p style="margin-bottom:16px;"><strong>Not accurate.</strong> It applies only to applicants whose previous degree falls within Engineering, Commerce/Accounting/Finance/Economics, or Business/Management, and only for Summer 2027 intake and later. Several exemptions also apply regardless of field. Bachelor's applicants, PhD applicants, and students in confirmed exchange/partnership programmes are outside its scope entirely.</p>

      <p style="margin-bottom:8px;"><strong>Misconception 5: "A good score guarantees admission"</strong></p>
      <p style="margin-bottom:16px;"><strong>Not accurate.</strong> Each German university decides independently how to weigh the dMAT result as part of a full application. It's one data point among your grades, degree, and other documents \u{2014} not a guarantee in either direction.</p>

      <p style="margin-bottom:16px;">A general note on sourcing: several numbers circulating about the dMAT's exact scoring scale (for example, specific percentile or 0\u{2013}200 point-scale claims) come from third-party interpretation sites, not from a document we've been able to directly confirm on aps-india.de or gast.de. We treat those specific figures as unconfirmed until we find them stated directly by APS India or g.a.s.t. themselves, and we'd rather say that plainly than repeat a number we can't trace to an official source.</p>

      <p>Sources: <a href="https://aps-india.de/dmat/" target="_blank" rel="noopener noreferrer" style="text-decoration:underline;">aps-india.de/dmat</a>, <a href="https://www.d-mat.de/en/dmat-in-india/" target="_blank" rel="noopener noreferrer" style="text-decoration:underline;">d-mat.de/en/dmat-in-india</a>, <a href="https://www.gast.de/de/" target="_blank" rel="noopener noreferrer" style="text-decoration:underline;">gast.de</a>. Checked 03 July 2026.</p>

        <p style="margin-bottom:16px;"><strong>Last updated:</strong> 02 July 2026</p>
        <p style="margin-bottom:16px;">By visiting or using the dMAT.prep website, you agree to the following terms.</p>

        <p style="margin-bottom:8px;"><strong>1. What this site is</strong></p>
