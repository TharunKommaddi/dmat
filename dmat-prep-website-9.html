eholderEmail:"you@example.com",placeholderSubject:"What's this about?",placeholderMessage:"Your message",errorName:"Name is required.",errorEmail:"Enter a valid email address.",errorSubject:"Subject is required.",errorMessage:"Message is required.",sendBtn:"Send",notConnectedNote:"This form isn't connected to an email service yet, so your message wasn't actually sent. Please use the email or phone contacts on this page instead for now."},faq:{kicker:"FAQ",title:"Frequently asked questions",intro:"Every answer here is a plain-language paraphrase of APS India's official dMAT FAQ. For anything specific to your own case, contact APS India or g.a.s.t. directly.",source:"APS India official FAQ, verified 02 Jul 2026",footerNote:"This FAQ paraphrases the official APS India dMAT page. Wording is ours; the underlying facts are theirs. For the complete, word-for-word official version, see"},loginModal:{signOut:"Sign out",signingOut:"Signing out...",tabLogin:"Log in",tabSignup:"Sign up",signedInAs:"Signed in as",currentPlan:"Current plan:",planFree:"Free",planPractice:"Practice",loginIntro:"Access your practice sets and progress.",signupIntro:"Create an account and choose a plan.",placeholderEmail:"Email",placeholderPassword:"Password",placeholderPasswordMin:"Password (min. 6 characters)",placeholderName:"Name",loginBtn:"Log in",signingIn:"Signing in...",createAccountBtn:"Create account",creatingAccount:"Creating account...",errorLoginInvalid:"Enter a valid email and your password.",errorSignupInvalid:"Fill in your name, a valid email, and a password of at least 6 characters.",disclosure:"Accounts and login run on a real Supabase backend. The Practice plan now goes through a real Razorpay Checkout flow with server-side signature verification — but it's configured with placeholder test keys, so payment will not complete successfully until real Razorpay keys are added.",planDescFree:"Eligibility checker, official links, 2 sample questions",planDescPractice:"Full unofficial practice sets, all Core Module task types"},blog:{kicker:"Blog",title:"Notes on the dMAT, sourced and dated",intro:"Everything here is sourced directly from APS India and g.a.s.t., with dates so you know how current it is. Where a claim comes from anywhere else, we say so.",backToAll:"Back to all posts"}},de:{nav:{home:"Startseite",about:"Über uns",dmatGuide:"dMAT-Leitfaden",blog:"Blog",contact:"Kontakt",login:"Anmelden"},common:{readMore:"Weiterlesen",backToAll:"Zurück zu allen Beiträgen",send:"Senden",loading:"Wird geladen...",close:"Schließen",cancel:"Abbrechen",save:"Speichern"},hero:{headline1:"Der dMAT ist neu.",headline2:"Deine Unterlagen",headline3:"müssen dich nicht verwirren.",intro:"Ab dem Sommersemester 2027 müssen indische Bewerber für deutsche Masterstudiengänge in den Bereichen Ingenieurwesen, Handel sowie Wirtschaft/Management ein dMAT-Zertifikat zusammen mit ihren APS-Unterlagen einreichen. Wir verfolgen die offiziellen Anforderungen, damit du sie nicht selbst aus Foren zusammensuchen musst.",ctaCheck:"Prüfen, ob der dMAT für dich gilt",ctaPractice:"Übungsmaterialien ansehen",stats:{opened:"Anmeldung geöffnet",closes:"Anmeldeschluss",firstTest:"Erster Testtermin",certificates:"Zertifikate ausgestellt"}},dmatInfo:{kicker:"01 — Verstehen",title:"Was der dMAT eigentlich ist",p1:"Der Digital Master Test ist ein standardisierter akademischer Eignungstest, der von g.a.s.t. durchgeführt wird und als zusätzliches Element im APS-Dokumentationsprozess eingeführt wurde — er ersetzt weder die APS-Prüfung noch die anabin-Anerkennung oder die Zulassungsentscheidung einer Universität.",p2:"Er gilt nur für ausgewählte Fachrichtungen, nur für das Sommersemester 2027 und später, und nur wenn keine Übergangsregelung greift.",source:"Offizielle Mitteilung von APS India, aktualisiert am 30. Juni 2026",checkTitle:"Schnelle Eignungsprüfung",checkIntro:"Beantworte drei Fragen, um zu sehen, ob der dMAT wahrscheinlich für dich gilt.",labelField:"Deine bisherige Studienrichtung",labelIntake:"Angestrebtes Semester",labelAps:"APS-Status",fields:["Ingenieurwesen (inkl. Informatik/IT)","Handel / Rechnungswesen / Finanzen / Wirtschaftswissenschaften","Wirtschaft / Management","Anderes Fach"],intakes:["Wintersemester 2026/27","Sommersemester 2027 oder später"],apsStatus:["APS-Anmeldung noch nicht begonnen","Registriert/Unterlagen versandt vor dem 29. Juni 2026","Registriert/Unterlagen versandt am oder nach dem 29. Juni 2026","Habe bereits mein APS-Zertifikat"],resultNeeded:"dMAT wahrscheinlich erforderlich",resultNotNeeded:"dMAT wahrscheinlich nicht erforderlich",reasonOtherField:"Dein Fach gehört nicht zur aktuellen Liste der betroffenen Bereiche (Ingenieurwesen, Handel/Finanzen, Wirtschaft/Management).",reasonWinter:"Der dMAT gilt erst ab dem Sommersemester 2027 — die ersten Zertifikate werden erst am 12. Oktober 2026 ausgestellt, nach den Fristen für das Wintersemester 2026/27.",reasonHasCert:"Bewerber, die bereits ein APS-Zertifikat besitzen, müssen den dMAT für dieses abgeschlossene Verfahren nicht ablegen.",reasonExempt:"Du bist befreit — eine vor dem 29. Juni 2026 abgeschlossene APS-Registrierung oder ein vor diesem Datum erfolgter Versand der Unterlagen gilt als Übergangsregelung.",reasonNeeded:"Basierend auf deinem Fach und dem angestrebten Semester ist das dMAT-Zertifikat als Teil deiner APS-Dokumentation erforderlich.",disclaimer:"Dies ist eine Orientierungshilfe auf Basis der aktuellen offiziellen Regeln, keine verbindliche Feststellung. Kläre deinen konkreten Fall direkt mit APS India ab."},booking:{kicker:"03 — Anmeldung",title:"Prüfungsbuchung",p1:'g.a.s.t. übernimmt Registrierung, Zahlung, Testzentrumsbuchung und Ergebnisse direkt — Plätze werden nach dem Prinzip "Wer zuerst kommt, mahlt zuerst" vergeben. Wir wickeln Buchungen nicht selbst ab; hier geht\'s direkt zur Quelle.',source:"APS India / g.a.s.t.",registerBtn:"Bei g.a.s.t. registrieren",fee:"Gebühr: €150 · Anmeldeschluss 15. Sep 2026",centersTitle:"Testzentren (Einführungsphase)",centersNote:"Die endgültige Verfügbarkeit der Testzentren wird während der Registrierung angezeigt und hängt von den verbleibenden Plätzen ab — g.a.s.t. kann keine Plätze im Voraus reservieren."},apsSupport:{kicker:"04 — Dokumentation",title:"APS-Unterstützung",p1:"APS India bleibt allein dafür verantwortlich, die Echtheit und formale Plausibilität deiner akademischen Unterlagen zu prüfen. Der dMAT ist eine zusätzliche Anforderung, die diesen Prozess ergänzt — nicht ersetzt.",p2:"Ein dMAT-Zertifikat gleicht niemals einen Abschluss einer nicht anerkannten Institution aus. Wenn deine bisherige Universität in anabin als H+/-, H- oder mit unklarem Status geführt wird, kläre das zuerst.",anabinLink:"Institution bei anabin prüfen →",source:"APS India, aktualisiert am 30. Juni 2026",exemptTitle:"Du bist vom dMAT befreit, wenn …",exemptions:["APS-Online-Registrierung vor dem 29. Juni 2026 abgeschlossen","Vollständige APS-Bewerbungsunterlagen vor dem 29. Juni 2026 versandt","Bereits ein ausgestelltes APS-Zertifikat für das entsprechende Verfahren besitzt","Teilnahme an einem offiziell bestätigten Austausch-, Doppelabschluss- oder Universitätspartnerschaftsprogramm"]},admissionSupport:{kicker:"05 — Nach dem Test",title:"Unterstützung bei der Zulassung",cards:[{title:"Der dMAT entscheidet nicht über die Zulassung",body:"Deutsche Universitäten entscheiden eigenständig, wie sie dein dMAT-Ergebnis gewichten. Es ist ein Element unter vielen in deiner gesamten Bewerbung, kein Filter."},{title:"Das Ergebnis erscheint auf deinem APS-Zertifikat",body:"Dein dMAT-Ergebnis wird nach Ausstellung auf deinem APS-Zertifikat vermerkt, zusammen mit der üblichen Dokumentenprüfung."},{title:"Ein niedriges Ergebnis ist keine Ablehnung",body:"APS India hat bestätigt, dass ein niedriges dMAT-Ergebnis die Ausstellung deines APS-Zertifikats nicht automatisch verhindert."}]},dmatGuideTabs:{overview:"Übersicht",practice:"Übung",booking:"Anmeldung",aps:"APS-Unterstützung",admission:"Nach der Prüfung"},practice:{kicker:"02 — Vorbereiten",title:"Übungsmaterialien",intro:"Wir trennen offizielle g.a.s.t.-Materialien klar von unseren eigenen Übungsinhalten — wir hosten keine urheberrechtlich geschützten g.a.s.t.-Inhalte weiter und geben eigene Fragen nicht als offiziell aus.",tabOfficial:"Offiziell (g.a.s.t.)",tabUnofficial:"Unsere Übungssets",officialNote:"Hinweis: Die offiziellen Vorbereitungsmaterialien von g.a.s.t. beschreiben die drei bestätigten Aufgabentypen des Core Module — Bildfolgen, Lateinische Quadrate und Gleichungssysteme —, die allgemein für alle dMAT-Fachrichtungen gelten. Wir haben kein Indien-spezifisches Dokument gefunden, das bestätigt, dass diese Core-Module-Zusammensetzung identisch mit dem im APS-Verfahren verwendeten Allgemeinen Akademischen Modul ist, auch wenn das Core Module auf der g.a.s.t.-Website als fachrichtungsübergreifend einheitlich beschrieben wird. Sollte sich das weiter bestätigen, aktualisieren wir diesen Hinweis.",officialLinks:[{title:"dMAT-Vorbereitungsmaterialien für Testteilnehmer (2025)",desc:"Offizielles Vorbereitungs-PDF von g.a.s.t. — Core-Module-Format, ausgearbeitete Beispiele für Muster- und Folgenaufgaben."},{title:"d-mat.de — Vorbereitung auf die Prüfung",desc:"Offizieller Überblick über Prüfungsformat und Vorbereitungshinweise von g.a.s.t."}],unofficialNote:"Basiert auf den drei Aufgabentypen, die in den offiziellen Core-Module-Vorbereitungsmaterialien von g.a.s.t. dokumentiert sind (Bildfolgen, Lateinische Quadrate, Gleichungssysteme). Dies sind eigene Fragen, die wir passend zu diesem dokumentierten Format geschrieben haben — keine offiziellen g.a.s.t.-Inhalte, und nicht garantiert identisch mit dem Schwierigkeitsgrad oder Stil der echten Prüfung. Jedes Set unten enthält unterschiedliche Fragen.",answerLabel:"Antwort:",lockTitle:"Vollständige Sets — ₹499 einmalig",lockDesc:"Schaltet die Übungssets 2–5 mit allen drei Core-Module-Aufgabentypen frei.",upgrade:"Upgrade",signUp:"Registrieren",paymentNote:"Ein ec documents first and add the dMAT certificate later once it's available — but APS India can only complete your procedure after the dMAT certificate is submitted."}]},{section:"B. Exemptions",items:[{question:"I registered for APS online before 29 June 2026 but haven't shipped documents yet. Do I need the dMAT?",answer:"No. Completing APS online registration before 29 June 2026 exempts you for that APS procedure, even if you ship your physical documents afterward."},{question:"I shipped my APS documents before 29 June 2026. Do I need the dMAT?",answer:"No, you're exempt for that procedure — even if verification is still ongoing and your certificate hasn't been issued yet. Keep proof of shipment in case it's requested."},{question:"I already have my APS certificate. Do I need the dMAT?",answer:"No, not for that completed procedure. If you submit a new APS application later, the rules in force at that time will apply."},{question:"Am I exempt if I'm on an exchange, double-degree, or partnership programme?",answer:"Yes. Submit the relevant confirmation from your home institution, the German partner institution, or the programme coordinator, including your group number, alongside your APS documentation."},{question:"I'm applying for Winter Semester 2026/27. Do I need the dMAT?",answer:"No. The first dMAT certificates aren't available until 12 October 2026 — after most Winter 2026/27 deadlines. The requirement is intended for Summer 2027 intake and beyond."}]},{section:"C. Recognition, anabin, and formal eligibility",items:[{question:"Does the dMAT replace anabin or formal degree recognition?",answer:"No. A dMAT certificate doesn't change your institution's or degree's recognition status. APS India continues to assess eligibility under its existing procedure, separately from the dMAT."},{question:"My university shows H+/- or H- in anabin. Should I still take the dMAT?",answer:"Check your anabin status carefully before registering for the dMAT or submitting your APS application. Taking the dMAT does not make a degree from a non-recognised institution eligible for APS certification or German university admission."},{question:"Can a good dMAT score compensate for a non-recognised institution?",answer:"No. The dMAT is an academic aptitude test — it doesn't establish formal eligibility, replace anabin, or override recognition requirements."}]},{section:"D. APS procedure and the dMAT certificate",items:[{question:"Does the dMAT replace APS document verification?",answer:"No. APS India continues verifying document authenticity and formal plausibility exactly as before — the dMAT is an additional element, not a substitute."},{question:"Will a low dMAT score automatically get my APS certificate denied?",answer:"No. The dMAT isn't a stand-alone pass/fail test for APS purposes. A low score doesn't automatically lead to a refusal — the APS certificate documents the verification result and, where applicable, reflects the dMAT result."},{question:"Will my dMAT score appear on my APS certificate?",answer:"Yes, for applicants required to take the dMAT. The APS certificate will note that the dMAT was taken and include the result from the certificate issued by g.a.s.t."},{question:"Who issues the dMAT certificate — APS India or g.a.s.t.?",answer:"g.a.s.t. issues the dMAT certificate, not APS India. It's downloadable from the g.a.s.t. test-takers' portal once results are published."}]},{section:"E. Registration, test centres, and fees",items:[{question:"What's the registration timeline?",answer:"Registration opened 29 June 2026, closes 15 September 2026. The test date is 26 September 2026, with certificates available online from 12 October 2026."},{question:"Where can I take the test?",answer:"Planned centres for this first sitting: Ahmedabad, Bengaluru, Bhopal, Chandigarh, Chennai, Kolkata, Mananthavady, Mumbai, New Delhi, and Pune. The final confirmed list is shown during registration."},{question:"What if my preferred test centre is full?",answer:"Booking is first come, first served through g.a.s.t. — APS India cannot reserve seats. You may need to choose a different available centre."},{question:"How much does the dMAT cost?",answer:"€150, payable to g.a.s.t. during registration. Refund conditions exist for certain circumstances — check g.a.s.t.'s terms and conditions before paying."},{question:"Who handles registration and payment — APS India or g.a.s.t.?",answer:"g.a.s.t. handles registration, payment, test centre booking, and results. APS India handles only the separate document-verification procedure."}]},{section:"F. How German universities use the dMAT",items:[{question:"Will German universities actually look at my dMAT result?",answer:"It accompanies your APS certificate as part of your application documentation, but each university decides independently how to weigh it. It doesn't replace the university's own admission decision."},{question:"Does a good dMAT score guarantee admission?",answer:"No. Admission decisions are made independently by each German university — a dMAT result doesn't guarantee an outcome either way."}]},{section:"G. Who to contact",items:[{question:"Who do I contact for APS questions (documents, exemptions, eligibility)?",answer:"APS India directly: info@aps-india.de"},{question:"Who do I contact for dMAT questions (registration, payment, test day, results)?",answer:"g.a.s.t. directly: kontakt@gast.de"}]}],ir=[{section:"A. Umfang und Anforderung",items:[{question:"Wer muss den dMAT ablegen?",answer:"Bewerber, deren bisheriger Abschluss in den Bereichen Ingenieurwesen, Handel/Rechnungswesen/Finanzen/Wirtschaftswissenschaften oder Wirtschaft/Management liegt und die sich für das Sommersemester 2027 oder später bewerben."},{question:"Welche Bewerber sind NICHT betroffen?",answer:"Bachelor-Bewerber; Bachelor-Studierende, die noch nicht mindestens 5 Semester (3-jähriges Programm) oder 7 Semester (4-jähriges Programm) abgeschlossen haben; Promotionsbewerber; Bewerber, deren Abschluss außerhalb der gelisteten Fachrichtungen liegt; sowie Bewerber in offiziell bestätigten Austausch-, Doppelabschluss- oder Universitätspartnerschaftsprogrammen."},{question:"Ich habe ein gemischtes oder interdisziplinäres Fach studiert (z. B. Engineering Management, Business Analytics, Data Science). Bin ich betroffen?",answer:"Die Einstufung erfolgt anhand der offiziellen Liste der betroffenen Fachrichtungen von APS India, nicht danach, wie sich dein Studiengang vermarktet. Prüfe direkt das offizielle PDF — mehrere häufig als abgedeckt angenommene Fächer (wie eigenständige Informatik, BCA oder Data Science) sind ausdrücklich als nicht automatisch abgedeckt gelistet."},{question:"Ist der dMAT verpflichtend?",answer:"Ja, für Bewerber in den betroffenen Fachrichtungen, die sich für das Sommersemester 2027 oder später bewerben. APS India kann die Bewerbung erst als vollständig bearbeiten, wenn die dMAT-Dokumentation eingereicht wurde."},{question:"Kann ich zuerst APS abschließen und den dMAT später ablegen?",answer:"Nein. Wenn du in einer betroffenen Fachrichtung für das Sommersemester 2027 oder später studierst, muss das dMAT-Zertifikat zusammen mit deinen APS-Bewerbungsunterlagen eingereicht werden."},{question:"Kann ich meine APS-Unterlagen ohne das dMAT-Zertifikat einreichen?",answer:"Wenn du dich am oder nach dem 29. Juni 2026 für APS registriert hast und die dMAT-Anforderung für dich gilt, kannst du deine übrigen APS-Unterlagen zuerst einreichen und das dMAT-Zertifikat später nachreichen, sobald es verfügbar ist — APS India kann dein Verfahren jedoch erst nach Einreichung des dMAT-Zertifikats abschließen."}]},{section:"B. Ausnahmen",items:[{question:"Ich habe mich vor dem 29. Juni 2026 online für APS registriert, aber noch keine Unterlagen versandt. Brauche ich den dMAT?",answer:"Nein. Der Abschluss der APS-Online-Registrierung vor dem 29. Juni 2026 befreit dich für dieses APS-Verfahren, auch wenn du deine physischen Unterlagen erst danach versendest."},{question:"Ich habe meine APS-Unterlagen vor dem 29. Juni 2026 versandt. Brauche ich den dMAT?",answer:"Nein, du bist für dieses Verfahren befreit — auch wenn die Prüfung noch läuft und dein Zertifikat noch nicht ausgestellt wurde. Bewahre einen Versandnachweis auf, falls er angefordert wird."},{question:"Ich habe bereits mein APS-Zertifikat. Brauche ich den dMAT?",answer:"Nein, nicht für dieses abgeschlossene Verfahren. Wenn du später eine neue APS-Bewerbung einreichst, gelten die zu diesem Zeitpunkt geltenden Regeln."},{question:"Bin ich befreit, wenn ich an einem Austausch-, Doppelabschluss- oder Partnerschaftsprogramm teilnehme?",answer:"Ja. Reiche die entsprechende Bestätigung deiner Heimatinstitution, der deutschen Partnerinstitution oder des Programmkoordinators zusammen mit deiner APS-Dokumentation ein, einschließlich deiner Gruppennummer."},{question:"Ich bewerbe mich für das Wintersemester 2026/27. Brauche ich den dMAT?",answer:"Nein. Die ersten dMAT-Zertifikate sind erst ab dem 12. Oktober 2026 verfügbar — nach den meisten Fristen für das Wintersemester 2026/27. Die Anforderung ist für das Sommersemester 2027 und später vorgesehen."}]},{section:"C. Anerkennung, anabin und formale Zulassungsvoraussetzungen",items:[{question:"Ersetzt der dMAT anabin oder die formale Anerkennung des Abschlusses?",answer:"Nein. Ein dMAT-Zertifikat ändert nichts am Anerkennungsstatus deiner Institution oder deines Abschlusses. APS India prüft die Zulassungsvoraussetzungen weiterhin nach dem bestehenden Verfahren, unabhängig vom dMAT."},{question:"Meine Universität wird in anabin als H+/- oder H- geführt. Sollte ich trotzdem den dMAT ablegen?",answer:"Prüfe deinen anabin-Status sorgfältig, bevor du dich für den dMAT registrierst oder deine APS-Bewerbung einreichst. Das Ablegen des dMAT macht einen Abschluss einer nicht anerkannten Institution nicht für die APS-Zertifizierung oder die Zulassung an einer deutschen Universität berechtigt."},{question:"Kann ein gutes dMAT-Ergebnis eine nicht anerkannte Institution ausgleichen?",answer:"Nein. Der dMAT ist ein akademischer Eignungstest — er begründet keine formale Zulassungsberechtigung, ersetzt nicht anabin und hebt keine Anerkennungsanforderungen auf."}]},{section:"D. APS-Verfahren und das dMAT-Zertifikat",items:[{question:"Ersetzt der dMAT die APS-Dokumentenprüfung?",answer:"Nein. APS India prüft weiterhin die Echtheit und formale Plausibilität der Dokumente genau wie zuvor — der dMAT ist ein zusätzliches Element, kein Ersatz."},{question:"Führt ein niedriges dMAT-Ergebnis automatisch zur Ablehnung meines APS-Zertifikats?",answer:"Nein. Der dMAT ist für APS-Zwecke kein eigenständiger Bestehen/Nichtbestehen-Test. Ein niedriges Ergebnis führt nicht automatisch zur Ablehnung — das APS-Zertifikat dokumentiert das Prüfergebnis und spiegelt gegebenenfalls das dMAT-Ergebnis wider."},{question:"Erscheint mein dMAT-Ergebnis auf meinem APS-Zertifikat?",answer:"Ja, für Bewerber, die zur Ablegung des dMAT verpflichtet sind. Das APS-Zertifikat vermerkt, dass der dMAT abgelegt wurde, und enthält das Ergebnis aus dem von g.a.s.t. ausgestellten Zertifikat."},{question:"Wer stellt das dMAT-Zertifikat aus — APS India oder g.a.s.t.?",answer:"g.a.s.t. stellt das dMAT-Zertifikat aus, nicht APS India. Es ist nach Veröffentlichung der Ergebnisse über das Testteilnehmerportal von g.a.s.t. herunterladbar."}]},{section:"E. Registrierung, Testzentren und Gebühren",items:[{question:"Wie sieht der Registrierungszeitplan aus?",answer:"Die Registrierung begann am 29. Juni 2026 und endet am 15. September 2026. Der Testtermin ist der 26. September 2026, Zertifikate sind ab dem 12. Oktober 2026 online verfügbar."},{question:"Wo kann ich den Test ablegen?",answer:"Geplante Zentren für diesen ersten Testtermin: Ahmedabad, Bengaluru, Bhopal, Chandigarh, Chennai, Kolkata, Mananthavady, Mumbai, Neu-Delhi und Pune. Die endgültige, bestätigte Liste wird während der Registrierung angezeigt."},{question:"Was, wenn mein bevorzugtes Testzentrum ausgebucht ist?",answer:'Die Buchung erfolgt über g.a.s.t. nach dem Prinzip "Wer zuerst kommt, mahlt zuerst" — APS India kann keine Plätze reservieren. Möglicherweise musst du ein anderes verfügbares Zentrum wählen.'},{question:"Wie viel kostet der dMAT?",answer:"€150, zahlbar an g.a.s.t. während der Registrierung. Unter bestimmten Umständen gibt es Rückerstattungsbedingungen — prüfe die Geschäftsbedingungen von g.a.s.t. vor der Zahlung."},{question:"Wer kümmert sich um Registrierung und Zahlung — APS India oder g.a.s.t.?",answer:"g.a.s.t. übernimmt Registrierung, Zahlung, Testzentrumsbuchung und Ergebnisse. APS India ist ausschließlich für das separate Dokumentenprüfungsverfahren zuständig."}]},{section:"F. Wie deutsche Universitäten den dMAT nutzen",items:[{question:"Schauen sich deutsche Universitäten mein dMAT-Ergebnis tatsächlich an?",answer:"Es begleitet dein APS-Zertifikat als Teil deiner Bewerbungsunterlagen, aber jede Universität entscheidet eigenständig, wie sie es gewichtet. Es ersetzt nicht die eigene Zulassungsentscheidung der Universität."},{question:"Garantiert ein gutes dMAT-Ergebnis die Zulassung?",answer:"Nein. Zulassungsentscheidungen werden von jeder deutschen Universität eigenständig getroffen — ein dMAT-Ergebnis garantiert kein Ergebnis in die eine oder andere Richtung."}]},{section:"G. Wen kontaktieren",items:[{question:"An wen wende ich mich bei APS-Fragen (Unterlagen, Ausnahmen, Zulassungsvoraussetzungen)?",answer:"Direkt an APS India: info@aps-india.de"},{question:"An wen wende ich mich bei dMAT-Fragen (Registrierung, Zahlung, Testtag, Ergebnisse)?",answer:"Direkt an g.a.s.t.: kontakt@gast.de"}]}];function ii({standalone:e=!1}){let[t,n]=(0,T.useState)(null),{lang:r}=rJ(),i=rZ[r].faq;return(0,_.jsxs)("div",{id:"faq",className:"bg-[var(--parchment)]",children:[(0,_.jsxs)("section",{className:`max-w-4xl mx-auto px-5 sm:px-8 pb-12 ${e?"pt-32 sm:pt-40":"pt-16 border-t border-[var(--rule)]"}`,children:[(0,_.jsx)("span",{className:"font-mono text-[1 sk's single-missing-letter format."},{type:"Systems of Equations",prompt:"Solve for A and B: 2A + B = 18, and A = B.",answer:"A = 6, B = 6. Since A = B, substitute B for A in the first equation: 2A + A = 18, so 3A = 18, A = 6. Since A = B, B = 6 too.",note:"Modeled on the officially documented Systems of Equations task, using an equality constraint between the two variables."}]},{id:"set-5",title:"Practice Set 5",questions:[{type:"Figure Sequences",prompt:"A star grows by one point each matrix, starting at 3 points in matrix 1. If this pattern continues, how many points does it have in matrix 4?",answer:"6 points. Matrix 1 = 3, matrix 2 = 4, matrix 3 = 5, matrix 4 = 6 — one point added each step.",note:"Modeled on the officially documented Figure Sequences task, which includes shape-transformation rules like changing point count, not just movement."},{type:"Latin Square",prompt:"In a 5×5 grid, a row contains B, C, D, and E filled in four of the five positions. Which letter must go in the fifth, marked field?",answer:"A — since B, C, D, and E already appear once each in that row, A is the only letter left to complete it.",note:"Modeled on the officially documented Latin Square task's single-missing-letter format, applied to a different starting set of filled letters."},{type:"Systems of Equations",prompt:"Solve for A and B: B − A = 10, and B = 2A + 1.",answer:"A = 9, B = 19. Substituting B = 2A + 1 into the first equation: (2A + 1) − A = 10, so A + 1 = 10, A = 9. Then B = 2 × 9 + 1 = 19.",note:"Modeled on the officially documented Systems of Equations task, combining substitution with a slightly longer solving chain."}]}],i_=[{id:"set-1",title:"Übungsset 1",questions:[{type:"Figure Sequences",prompt:"Ein blaues Quadrat startet oben links in einem 2×2-Feldraster (innerhalb einer größeren Matrix) und bewegt sich mit jedem Schritt ein Feld im Uhrzeigersinn weiter. Wo befindet es sich nach 3 Schritten ab der Startposition oben links?",answer:"Unten links. Im Uhrzeigersinn ab oben links: Schritt 1 → oben rechts, Schritt 2 → unten rechts, Schritt 3 → unten links.",note:"Basiert auf der offiziell dokumentierten Bildfolgen-Aufgabe, bei der sich Figuren nach einer festgelegten Regel über mehrere Matrizen hinweg bewegen, drehen oder die Farbe wechseln."},{type:"Latin Square",prompt:"In einem 5×5-Raster kommt jeder der Buchstaben A–E genau einmal pro Zeile und Spalte vor. In einer Zeile sind bereits A, C, D und E in vier der fünf Positionen eingetragen. Welcher Buchstabe muss in das fünfte, markierte Feld?",answer:"B — da A, C, D und E in dieser Zeile bereits je einmal vorkommen und jeder Buchstabe genau einmal auftreten muss, bleibt nur B übrig.",note:"Basiert auf der offiziell dokumentierten 5×5-Lateinisches-Quadrat-Aufgabe, bei der jede Zeile und Spalte jeden Buchstaben genau einmal enthält."},{type:"Systems of Equations",prompt:"Löse nach A und B auf: A + B = 10, und A − B = 4.",answer:"A = 7, B = 3. Beide Gleichungen addiert: 2A = 14, also A = 7. Eingesetzt: 7 + B = 10, also B = 3.",note:"Basiert auf der offiziell dokumentierten Gleichungssysteme-Aufgabe — löse zwei Gleichungen für zwei benannte Variablen."}]},{id:"set-2",title:"Übungsset 2",questions:[{type:"Figure Sequences",prompt:'Ein Dreieck bewegt sich von Matrix 1 zu Matrix 2 um 1 Feld nach rechts, von Matrix 2 zu Matrix 3 um 2 Felder, von Matrix 3 zu Matrix 4 um 3 Felder (eine "+1 Schritt"-Regel). Um wie viele Felder bewegt es sich von Matrix 4 zu Matrix 5?',answer:"4 Felder. Die Schrittweite erhöht sich jedes Mal um 1: 1, 2, 3, dann 4.",note:'Basiert auf der offiziell dokumentierten "x + 1"-Bewegungssteigerungsregel für Bildfolgen.'},{type:"Latin Square",prompt:"In einer Spalte kommen die Buchstaben B, D und E bereits in drei der fünf Felder vor. Zwei Felder sind noch leer, markiert mit '?1' und '?2'. Da '?1' laut seiner Zeile nicht A sein kann — welche Buchstaben könnten '?1' und '?2' jeweils richtig ausfüllen?",answer:"A und C, in irgendeiner Reihenfolge — da B, D, E in dieser Spalte bereits verwendet werden, bleiben nur A und C übrig. Da '?1' nicht A sein kann (laut seiner Zeile), muss '?1' = C und '?2' = A sein.",note:"Basiert auf dem mehrstufigen Ausschlussverfahren der offiziell dokumentierten Lateinisches-Quadrat-Aufgabe, bei dem manchmal ein Feld ausgeschlossen werden muss, bevor ein anderes gelöst werden kann."},{type:"Systems of Equations",prompt:"Löse nach A und B auf: B = 2A, und A + B = 15.",answer:"A = 5, B = 10. B = 2A in die zweite Gleichung eingesetzt: A + 2A = 15, also 3A = 15, A = 5. Dann B = 2 × 5 = 10.",note:"Basiert auf der offiziell dokumentierten Gleichungssysteme-Aufgabe, die Einsetzung zwischen zwei Gleichungen verwendet."}]},{id:"set-3",title:"Übungsset 3",questions:[{type:"Figure Sequences",prompt:"Ein Kreis wechselt die Farbe in einem festen Zyklus: rot → blau → grün → rot → blau → grün, ein Wechsel pro Matrix. Wenn er in Matrix 1 blau ist, welche Farbe hat er in Matrix 5?",answer:"Grün. Der Zyklus verläuft blau → grün → rot → blau → grün mit jedem Schritt: Matrix 1 = blau, Matrix 2 = grün, Matrix 3 = rot, Matrix 4 = blau, Matrix 5 = grün.",note:"Basiert auf der offiziell dokumentierten Bildfolgen-Aufgabe, die neben der Positionsänderung auch Farbwechsel-Zyklen umfasst."},{type:"Latin Square",prompt:"In einem 5×5-Raster enthält eine Zeile bereits korrekt A, C, D und E. Eine zweite, unabhängige Zeile enthält korrekt B, C, D und E. Welcher Buchstabe fehlt jeweils in diesen beiden Zeilen?",answer:"In der ersten Zeile fehlt B (da A, C, D, E bereits verwendet werden, bleibt nur B). In der zweiten Zeile fehlt A (da B, C, D, E bereits verwendet werden, bleibt nur A).",note:"Basiert auf der offiziell dokumentierten Lateinisches-Quadrat-Aufgabe, hier erweitert um den Vergleich zweier unabhängiger, auf gleiche Weise gelöster Zeilen."},{type:"Systems of Equations",prompt:"Löse nach A und B auf: A − 3 = 11, und B = A + 9.",answer:"A = 14, B = 23. Aus der ersten Gleichung: A = 11 + 3 = 14. Eingesetzt in die zweite: B =
